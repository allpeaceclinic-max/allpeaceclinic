<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>성례 — 주제·북노트 위키</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caprasimo&family=Figtree:wght@400;600;700&family=Gowun+Batang:wght@400;700&display=swap');
:root{
  --bg:#f5ead8; --surface:#faf3e6; --surface2:#ebddc5;
  --ink:#201e1d; --muted:#5c574f; --meta:#8a8478;
  --line:color-mix(in srgb,#201e1d 16%,transparent);
  --line-soft:color-mix(in srgb,#201e1d 9%,transparent);
  --accent:#c67139; --accent-deep:#8f4e22; --accent-tint:#f3ddc9; --accent-ink:#faf3e6;
  --sage:#7a8a5e; --sage-deep:#4d5a38; --sage-tint:#e4e8d9;
  --font-display:"Caprasimo",system-ui,sans-serif;
  --font-serif:"Gowun Batang","AppleMyungjo",Batang,Georgia,serif;
  --font-sans:"Figtree",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Malgun Gothic",sans-serif;
  --r-sm:8px; --r-md:16px; --r-lg:28px;
  --shadow:0 1px 2px color-mix(in srgb,#2e2b25 14%,transparent);
  --shadow-md:0 3px 10px color-mix(in srgb,#2e2b25 16%,transparent);
}
@media (prefers-color-scheme:dark){:root{
  --bg:#262320; --surface:#2d2a26; --surface2:#33302b;
  --ink:#f5ead8; --muted:color-mix(in srgb,#f5ead8 75%,transparent);
  --meta:color-mix(in srgb,#f5ead8 48%,transparent);
  --line:color-mix(in srgb,#f5ead8 14%,transparent);
  --line-soft:color-mix(in srgb,#f5ead8 8%,transparent);
  --accent:#e0a375; --accent-deep:#e0a375;
  --accent-tint:color-mix(in srgb,#c67139 24%,transparent); --accent-ink:#262320;
  --sage-deep:#b8c49c; --sage-tint:color-mix(in srgb,#7a8a5e 20%,transparent);
  --shadow:none; --shadow-md:none;
}}
:root[data-theme="dark"]{
  --bg:#262320; --surface:#2d2a26; --surface2:#33302b;
  --ink:#f5ead8; --muted:color-mix(in srgb,#f5ead8 75%,transparent);
  --meta:color-mix(in srgb,#f5ead8 48%,transparent);
  --line:color-mix(in srgb,#f5ead8 14%,transparent);
  --line-soft:color-mix(in srgb,#f5ead8 8%,transparent);
  --accent:#e0a375; --accent-deep:#e0a375;
  --accent-tint:color-mix(in srgb,#c67139 24%,transparent); --accent-ink:#262320;
  --sage-deep:#b8c49c; --sage-tint:color-mix(in srgb,#7a8a5e 20%,transparent);
  --shadow:none; --shadow-md:none;
}
:root[data-theme="light"]{
  --bg:#f5ead8; --surface:#faf3e6; --surface2:#ebddc5;
  --ink:#201e1d; --muted:#5c574f; --meta:#8a8478;
  --line:color-mix(in srgb,#201e1d 16%,transparent);
  --line-soft:color-mix(in srgb,#201e1d 9%,transparent);
  --accent:#c67139; --accent-deep:#8f4e22; --accent-tint:#f3ddc9; --accent-ink:#faf3e6;
  --sage-deep:#4d5a38; --sage-tint:#e4e8d9;
  --shadow:0 1px 2px color-mix(in srgb,#2e2b25 14%,transparent);
  --shadow-md:0 3px 10px color-mix(in srgb,#2e2b25 16%,transparent);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);
  line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent-deep);text-decoration:none}
a:hover{color:var(--accent)}
::selection{background:var(--accent-tint)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--accent-deep);text-transform:uppercase}
.chip{font-size:11px;font-weight:700;border-radius:999px;padding:3px 10px;white-space:nowrap}
.chip.cat-t{color:var(--sage-deep);background:var(--sage-tint)}
.chip.cat-b{color:var(--accent-deep);background:var(--accent-tint)}

main{max-width:720px;margin:0 auto;padding:34px 22px 80px}
header.top{margin-bottom:10px}
.head-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;
  margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.head-row a{font-size:13px;font-weight:700;white-space:nowrap}
.meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.meta-row .date,.meta-row .author{font-size:12.5px;color:var(--meta);font-variant-numeric:tabular-nums}
h1.note-title{font-family:var(--font-serif);
  font-size:clamp(26px,4.4vw,34px);line-height:1.4;margin:14px 0 6px;text-wrap:balance;font-weight:700}
.pubnote{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:14px 0 0;padding:13px 18px;
  border-radius:var(--r-md);background:var(--surface2);font-size:12.5px;color:var(--muted)}
.pubnote a{margin-left:auto;font-weight:700;white-space:nowrap}
article.note{font-family:var(--font-serif);font-size:15px;line-height:1.95}
article.note h1{display:none}
article.note h2{font-family:var(--font-serif);font-size:20px;line-height:1.5;margin:34px 0 12px}
article.note h3{font-family:var(--font-serif);font-size:16.5px;margin:26px 0 8px}
article.note p{margin:0 0 16px;text-wrap:pretty}
article.note ul,article.note ol{padding-left:24px;margin:0 0 16px}
article.note li{margin:4px 0}
article.note blockquote{margin:0 0 16px;padding:14px 20px;border-left:4px solid var(--sage);
  border-radius:0 var(--r-md) var(--r-md) 0;background:var(--sage-tint);
  font-size:14.5px;line-height:1.85;color:var(--sage-deep)}
article.note blockquote p{margin:0 0 8px} article.note blockquote p:last-child{margin:0}
article.note table{border-collapse:collapse;margin:18px 0;display:block;overflow-x:auto;max-width:100%;
  font-family:var(--font-sans);font-size:13.5px;line-height:1.6}
article.note th,article.note td{border:1px solid var(--line);padding:7px 12px;text-align:left;vertical-align:top}
article.note th{background:var(--surface2);font-weight:700;white-space:nowrap}
article.note code{font-family:ui-monospace,Menlo,monospace;background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:.85em}
article.note pre{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;overflow-x:auto}
article.note pre code{border:0;padding:0}
article.note hr{border:0;border-top:1px solid var(--line);margin:30px 0}
article.note img{max-width:100%;border-radius:var(--r-sm)}
a.wl{color:var(--accent-deep);border-bottom:1.5px solid color-mix(in srgb,var(--accent) 45%,transparent);padding-bottom:1px}
a.wl:hover{color:var(--accent);border-bottom-color:var(--accent)}
span.wl-dead{color:var(--sage-deep);border-bottom:1.5px dotted var(--sage);padding-bottom:1px;cursor:default}
.footnote{margin-top:36px;border-top:1px solid var(--line);padding-top:10px;
  font-family:var(--font-sans);font-size:12px;line-height:1.7;color:var(--muted)}
.footnote hr{display:none}
.footnote ol{padding-left:20px}
.tagrow{margin-top:34px;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:7px}
.tagrow span{font-size:11.5px;color:var(--meta);background:var(--surface);border:1.5px solid var(--line);border-radius:999px;padding:4px 12px}
footer{margin-top:36px;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:8px 20px;justify-content:space-between;font-size:13px;color:var(--meta)}
footer a{font-weight:700}
</style></head><body><main>
<header class="top">

  </div>
  <div class="meta-row"><span class="chip cat-t">교회사</span><span class="date">2026-07-03</span></div>
  <h1 class="note-title">성례</h1>
  
</header>
<article class="note">
<h2>정의</h2>
<p>성례(sacrament)는 은혜의 가시적 표징이다. 중세 교회는 세례·성찬 등 일곱 성례 체계를 확립했다.</p>
<h2>교차 참조</h2>

</ul>
</article>

<footer>

</footer>
</main></body></html>
