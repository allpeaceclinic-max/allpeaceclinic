바(1999년, 이과수)가 21세기 선교학의 핵심 화두로 제시한 것을 임태순이 하나의 그림으로 연결: - 하나님의 선교 = 태양 (근원) - 번역 가능한 복음 = 대지 (토양) - 세계 기독교 = 대지에서 자라나는 나무 (현상)","c":"선교","u":"2026-05-03","l":26,"p":null,"a":"임태순"},{"n":"보냄받음_킴햄몬드","t":"보냄 받음 (Sent)","s":"칼 바르트 → 레슬리 뉴비긴 → 데이비드 보쉬 → 데럴 구더 → 앨런 록스버그로 이어지는 선교적 교회 운동의 실천 매뉴얼.","c":"선교","u":"2026-05-03","l":23,"p":null,"a":"킴 햄몬드"},{"n":"부모가된다는것_플라스펠러","t":"부모가 된다는 것","s":"``` 부모의 권위 (다스릴 권리) ↕ 갈등 자녀의 의지 + 죄성 ```","c":"상담·치유·가정","u":"2026-05-03","l":15,"p":null,"a":"스베냐 플라스펠러"},{"n":"부모학교_게리토마스","t":"부모학교","s":"“\"우리가 깨지는 곳도 가정이고, 우리가 치유되는 곳도 가정이다.\" — 칼 위태커”","c":"상담·치유·가정","u":"2026-05-03","l":22,"p":null,"a":"게리 토마스"},{"n":"부족한것이없는사람에게왜복음이필요한가_윌리몬","t":"부족한 것이 없는 사람에게 왜 복음이 필요한가","s":"기존 전도 공식: \"나는 비참했어요. 그때 예수님을 만났습니다.\"","c":"선교","u":"2026-05-03","l":22,"p":null,"a":"윌리엄 H. 윌리몬"},{"n":"비영리단체의경영_드러커","t":"비영리단체의 경영","s":"``` 기회 포착(통계·변화) → 내부 자원 교육 → 실행 (1/3만 따라와도 시작) → 시간이 지나 전체로 확산 ```","c":"리더십·일·경영","u":"2026-05-03","l":13,"p":null,"a":"피터 드러커"},{"n":"사람은어떻게변화되는가_레인트립","t":"사람은 어떻게 변화되는가","s":"→ 우리의 우상이 하나님이 주신 기회를 '애매한 고통'으로 보이게 만든다","c":"상담·치유·가정","u":"2026-05-10","l":20,"p":null,"a":"티모시 레인 & 폴 트립"},{"n":"선교란무엇인가_스토트라이트","t":"선교란 무엇인가","s":"이 책은 단독으로 읽히지 않는다. 로잔운동 50년의 신학적 진화를 이해해야 이 책의 무게가 보인다.","c":"선교","u":"2026-05-03","l":29,"p":null,"a":"존 스토트"},{"n":"선교사처럼살라_아이오그","t":"선교사처럼 살라","s":"이 책의 출발점: 선교 = 지리적 이동이 아니라 사람을 향한 헌신","c":"상담·치유·가정","u":"2026-05-03","l":28,"p":null,"a":"제프 아이오그"},{"n":"선교신학의도전-크레이그오트","t":"선교신학의 도전 (Encountering Theology of Mission)","s":"저자: 크레이그 오트 (Craig Ott), 트리니티 복음주의 신학대학원","c":"선교","u":"2026-04-16","l":4,"p":null,"a":"크레이그 오트"},{"n":"선교아이디어51_한철호","t":"선교 아이디어 51 — 한철호","s":"마지막 아이디어(#51)가 전체의 결론: > \"통합 선교 — 사회참여 + 복음증거. 이원론을 탈피하라.\"","c":"상담·치유·가정","u":"2026-05-06","l":18,"p":null,"a":"한철호"},{"n":"선교에대한네가지견해","t":"선교에 대한 네 가지 견해 — 통합 요약","s":"Counterpoints 형식 — 4인이 각자 견해를 펴고(본문), 나머지 3인이 논평한다. 편집자 섹스턴이 서문(p.11-25)과 결론(p.317-326)을 쓴다.","c":"선교","u":"2026-06-20","l":41,"p":"https://wiki.youngdoctor.kr/marktl/%EC%84%A0%EA%B5%90%EC%97%90%EB%8C%80%ED%95%9C%EB%84%A4%EA%B0%80%EC%A7%80%EA%B2%AC%ED%95%B4/","a":""},{"n":"선교의변질_크라이더","t":"선교의 변질 — 알렌 크라이더","s":"크라이더는 보쉬의 《변화하는 선교》가 크리스텐덤 전환의 심각성을 충분히 다루지 않았다고 비판한다.","c":"선교","u":"2026-05-03","l":23,"p":"https://wiki.youngdoctor.kr/marktl/%EC%84%A0%EA%B5%90%EC%9D%98%EB%B3%80%EC%A7%88_%ED%81%AC%EB%9D%BC%EC%9D%B4%EB%8D%94/","a":"알렌 크라이더"},{"n":"선교적가정_송기태","t":"선교적 가정 — 송기태","s":"people/송기태 선교사(인터서브 코리아)의 LAMs 과정 교재 시리즈. 아담 → 노아 → 아브라함 가정을 성경적 선교 단위로 재발견하고, 오늘날 기독 가정의 정체성과 사명을 정립한다.","c":"상담·치유·가정","u":"2026-05-06","l":18,"p":null,"a":"송기태"},{"n":"선교적리더십의양성","t":"선교적 리더십의 양성","s":"``` 구체적 경험 ↓ 숙고적 관찰 ←→ 적극적 실험 ↓ 추상적 개념화 ↓ 구체적 경험 (반복) ```","c":"리더십·일·경영","u":"2026-05-03","l":16,"p":null,"a":""},{"n":"선교적성경읽기_보컴","t":"선교적 성경읽기","s":"→ 성경 이야기 전체의 중심 = 삼위일체 하나님의 선교(미씨오 데이) → 교회는 그 선교에 참여하는 공동체","c":"선교","u":"2026-05-03","l":22,"p":null,"a":"리처드 보컴"},{"n":"선교지에어떤교회를세울것인가","t":"선교지에 어떤 교회를 세울 것인가","s":"재산권 논쟁의 뿌리는 3자의 서로 다른 인식에 있다:","c":"리더십·일·경영","u":"2026-05-08","l":32,"p":null,"a":""},{"n":"선한영향력-김진수","t":"선한 영향력 — 김진수","s":"“\"비즈니스 자체가 선교\" \"두 축(비즈니스·선교)은 덧셈이 아니라 곱셈의 관계\"”","c":"리더십·일·경영","u":"2026-05-03","l":23,"p":null,"a":"[[people/김진수]]"},{"n":"성경하나님의선교의기록이자도구","t":"성경, 하나님의 선교의 기록이자 도구","s":"→ 성경은 단순히 계시의 기록이 아니라 선교를 위한 수단으로 사용된다","c":"선교","u":"2026-05-03","l":22,"p":null,"a":""},{"n":"성공하는사람들의7가지습관-코비","t":"성공하는 사람들의 7가지 습관 (The 7 Habits of Highly Effective People)","s":"저자: 스티븐 코비 (Stephen Covey)","c":"리더십·일·경영","u":"2026-04-16","l":4,"p":null,"a":"스티븐 코비"},{"n":"성령에속한사람_이동원","t":"성령에 속한 사람 — 이동원","s":"하나님의 명령 = 인격을 통한 사역. 사역이 먼저가 아니라 존재가 먼저다.","c":"영성·제자도","u":"2026-05-06","l":6,"p":null,"a":"이동원"},{"n":"소명_오스기니스","t":"소명 (The Call) — 오스 기니스","s":"→ 소명이란 이 두 질문이 합쳐지는 지점: 창조와 부르심의 통합","c":"리더십·일·경영","u":"2026-05-03","l":34,"p":null,"a":"[[people/오스기니스]]"},{"n":"숨겨진상처의치유_정태기","t":"숨겨진 상처의 치유 — 정태기","s":"``` 길가 → 폐쇄된 자아중심성 (딱딱하고 굳은 마음) 돌밭 → 억압된 내면의 분노 (한이 박혀 있는 마음) 가시떨기 → 허위적 체면의식 (돈·명예·권력에 빼앗긴 마음) 옥토 → 가면을 벗은 어린아이의 심성 (치유된 마음) ```","c":"상담·치유·가정","u":"2026-05-03","l":29,"p":null,"a":"[[people/정태기]] 목사"},{"n":"신약의윤리적비전_헤이스","t":"신약의 윤리적 비전 — 리처드 헤이스","s":"``` 공동체 (Community) — 이스라엘의 연속성으로서 교회 ↓ 십자가 (Cross) — 행위의 패러다임, 자기 포기적 사랑 ↓ 새 창조 (New Creation) — 종말론적 하나님 나라, 부활의 능력 ```","c":"상담·치유·가정","u":"2026-05-05","l":39,"p":null,"a":"리처드 헤이스"},{"n":"실리콘밸리에선어떻게일하나요_크리스채","t":"실리콘밸리에선 어떻게 일하나요 — 크리스 채","s":"이 책의 바틈업 문화 + 피드백 문화 + Manage UP이 통합된 성경적 원형:","c":"리더십·일·경영","u":"2026-05-03","l":26,"p":null,"a":"크리스 채"},{"n":"아내가회복해야할역할","t":"아내가 회복해야 할 역할","s":"하나님과 동행하는 내면의 아름다움 · 신뢰할 만한 동반자 · 세심한 예산가 · 헌신적인 내조자 · 부드러운 연인 · 쾌활하고 검소한 주부 · 실내 장식가 · 구매 담당자 · 시간 관리자 · 창의적 요리사 · 여성 사업가 · 지혜로운 투자자 · 건강 관리 전문가 · 자원봉사자 · 인정 있는 이웃 · 말씀을 읽는 학생 · 매일 주님과 동행하는 사람 · 자비하고 경건한 모범적인 여성","c":"상담·치유·가정","u":"2026-05-04","l":10,"p":null,"a":""},{"n":"아무도보는이없을때_빌하이벨스","t":"아무도 보는 이 없을 때 당신은 누구인가? — 빌 하이벨스","s":"성령의 열매를 현대적 언어로 재해석. 시대적 필요에 따라 인격의 다섯 층위를 제시한다.","c":"리더십·일·경영","u":"2026-05-06","l":7,"p":null,"a":"빌하이벨스"},{"n":"아이들의불안감","t":"아이들의 불안감","s":"아이들이 가장 두려워하는 것은 부모의 사랑을 잃고 버림받는 것이다.","c":"상담·치유·가정","u":"2026-05-04","l":10,"p":null,"a":"미표기"},{"n":"영혼돌봄의목회","t":"영혼돌봄의 목회","s":"“애도의 과정에서 세상을 다시 배우는 것은 상실과는 다르게, 세상 속에서 존재하고 행하는 방법을 새로 배우는 것이다.”","c":"상담·치유·가정","u":"2026-05-04","l":16,"p":null,"a":""},{"n":"예수가선택한십자가_맥스루케이도","t":"예수가 선택한 십자가 (He Chose the Nails) — 맥스 루케이도","s":"“목요제자반 독후감 — 이상협 집사”","c":"영성·제자도","u":"2026-05-06","l":7,"p":null,"a":"맥스루케이도"},{"n":"오픈시크릿_레슬리뉴비긴","t":"오픈 시크릿 (The Open Secret)","s":"“\"세상에 대한 그리스도의 선교에 참여하지 않고서는 그리스도에게 참여하는 길이 없다.\" — 빌링겐 국제선교협의회 (1952)”","c":"선교","u":"2026-07-17","l":15,"p":null,"a":"레슬리 뉴비긴"},{"n":"온라인사역을부탁해_케빈리","t":"온라인 사역을 부탁해","s":"“온라인보다 사역이 목표 — 교회의 목표와 동일하게 세팅”","c":"영성·제자도","u":"2026-05-05","l":11,"p":null,"a":"케빈 리"},{"n":"요나의심판과구원_자끄엘륄","t":"요나의 심판과 구원","s":"이것이 엘륄이 요나서 1장 1절(\"하나님의 말씀이 요나에게 임하니라\")에서 뽑아낸 선택론의 핵심이다.","c":"선교","u":"2026-05-05","l":14,"p":null,"a":"자끄 엘륄"},{"n":"위기의십대기회의십대_폴트립","t":"위기의 십대 기회의 십대","s":"우리의 우상이 하나님이 주신 기회를 애매한 고통이라고 생각하게 만든다.","c":"상담·치유·가정","u":"2026-05-05","l":19,"p":null,"a":"폴 트립"},{"n":"의학과치유_마틴로이드존스","t":"의학과 치유","s":"마틴 로이드 존스는 의사 출신 목사다. 런던 바솔로뮤 병원에서 수련받고 실제 임상의로 일하다가 복음 사역으로 전환했다.","c":"상담·치유·가정","u":"2026-05-05","l":15,"p":null,"a":"마틴 로이드 존스"},{"n":"이별상담_출처미상","t":"사람들이 잘 이별할 수 있도록","s":"“상담자는 내담자가 잘 이별하도록 도울 뿐 아니라, 이별을 통보받은 사람도 도와야 한다.”","c":"상담·치유·가정","u":"2026-05-03","l":4,"p":null,"a":"출처 미상"},{"n":"이보다좋은복은없다_옥한흠","t":"이보다 좋은 복은 없다 — 옥한흠","s":"에베소서 1장을 중심으로 한 구원의 복 묵상.","c":"영성·제자도","u":"2026-05-06","l":9,"p":null,"a":"옥한흠"},{"n":"인비저블처치_김성규","t":"인비저블 처치 (Invisible Church)","s":"초대교회가 목적을 가지고 찾아가서 세운 첫 번째 교회는 빌립의 사마리아 교회다. 예수님도 거절당하셨던 그 땅, 하나님으로부터 멀리 떠났던 그곳에 먼저 찾아갔다.","c":"선교","u":"2026-06-02","l":20,"p":null,"a":"김성규"},{"n":"잊혀진교회의길","t":"잊혀진 교회의 길 (The Forgotten Ways)","s":"초대교회와 현대 중국 지하교회가 폭발적으로 성장한 이유는 mDNA(선교적 DNA)를 갖고 있었기 때문. 서구 교회는 이 사도적 특성을 잃어버렸다","c":"선교","u":"2026-04-17","l":8,"p":null,"a":"[[people/앨런허쉬]]"},{"n":"잊혀진교회의길_앨런허쉬","t":"잊혀진 교회의 길 (The Forgotten Ways)","s":"``` 그리스도가 누구인가? ↓ 어떻게 선교하는가? ↓ 교회는 어떤 형태여야 하는가? ```","c":"선교","u":"2026-05-05","l":28,"p":null,"a":"앨런 허쉬"},{"n":"자녀의마음을여는열쇠_게리스몰리","t":"자녀의 마음을 여는 열쇠","s":"게리 스몰리의 중심 개념은 자녀의 영혼(soul)이 부모를 향해 열려 있는가 닫혀 있는가다. 훈계의 기술보다","c":"상담·치유·가정","u":"2026-05-05","l":13,"p":null,"a":"게리 스몰리"},{"n":"자녀훈련18계명_이기복","t":"자녀 훈련 18계명 (이기복 교수의 성경적 부모교실)","s":"부모의 훈계는 자녀를 외적으로 통제하기 위한 것이 아니라, 자녀가 스스로 자신을 다스릴 수 있는 사람으로 자라도록 내적 역량을 형성하는 것이다.","c":"상담·치유·가정","u":"2026-05-05","l":16,"p":null,"a":"이기복 교수"},{"n":"장로직을다시생각하다","t":"장로직을 다시 생각하다","s":"장로제는 신약 교회의 중심 구조가 아니었다. 초기 교회를 이끈 것은 장로가 아닌 교회개척자(church planter)였다.","c":"리더십·일·경영","u":"2026-05-05","l":11,"p":null,"a":""},{"n":"전도서_크리스토퍼라이트","t":"전도서 — 크리스토퍼 라이트","s":"전도서는 절망의 책이 아니다. 질문하는 믿음(Questioning Faith) — 허무주의의 심연을 직시하면서도 신앙인으로 남아, 결국 믿음이 승리하는 이야기다.","c":"신학·사회","u":"2026-05-05","l":22,"p":null,"a":"크리스토퍼 라이트"},{"n":"정치공간에그리스도인으로서기","t":"정치 공간에 그리스도인으로 서기","s":"왜 그렇게 되는가? 말씀보다 이데올로기를 더 신뢰하기 때문이다.","c":"교회·공동체","u":"2026-05-05","l":26,"p":"https://wiki.youngdoctor.kr/marktl/%EC%A0%95%EC%B9%98%EA%B3%B5%EA%B0%84%EC%97%90%EA%B7%B8%EB%A6%AC%EC%8A%A4%EB%8F%84%EC%9D%B8%EC%9C%BC%EB%A1%9C%EC%84%9C%EA%B8%B0/","a":""},{"n":"제멋대로인요즘아이말씀으로양육하라_휴게이트","t":"제멋대로인 요즘아이 말씀으로 양육하라 (J. 리차드 휴게이트)","s":"``` 하나님 (궁극적 권위) ↓ 정부 · 결혼 · 부모 (제도적 권위) ↓ 자녀 (복종의 위치) ```","c":"상담·치유·가정","u":"2026-05-05","l":12,"p":null,"a":"J. 리차드 휴게이트"},{"n":"조직신학-웨인그루뎀","t":"조직신학 (Systematic Theology)","s":"\"주어진 주제에 관해서 성경 전체가 오늘날 우리들에게 무엇을 가르치는가?\"","c":"리더십·일·경영","u":"2026-04-16","l":13,"p":null,"a":"웨인 그루뎀"},{"n":"중독행동보상경험고찰_김재환","t":"중독행동이 보상경험과 심리적 기능에 대한 고찰","s":"유아 자아발달 4단계: ``` 자폐기 → 공생기 → 분리개별화 → 대상항상성(독립된 자아) ```","c":"상담·치유·가정","u":"2026-05-06","l":8,"p":null,"a":"김재환"},{"n":"직장인이라면다니엘처럼","t":"직장인이라면 다니엘처럼","s":"→ 핵심 통찰: 수용할 것과 거부할 것을 분별하는 지혜 격리가 아니라 대안 제시 — 창의적 타협이 아닌 창의적 대안","c":"선교","u":"2026-05-05","l":12,"p":null,"a":""},{"n":"창조타락구속_월터스","t":"창조, 타락, 구속 (알버트 월터스)","s":"하나님의 법이 세계를 지배하는 방식 2가지: - 자연법칙: 비인간 영역 — 직접적·강제적 - 규범: 문화·사회 영역 — 매개적, 인간이 하나님의 동역자","c":"선교","u":"2026-05-05","l":25,"p":null,"a":"알버트 월터스"},{"n":"처치시프트_이상훈","t":"처치 시프트 (이상훈)","s":"포스트모던 시대에 종교적 관심은 높아졌다: - 개인의 영적 신비와 체험 강조 - \"어떤 신이 진짜인가?\" — 종교 다원주의 확산","c":"선교","u":"2026-05-05","l":19,"p":null,"a":"이상훈"},{"n":"초기교회의인내와발효_크라이더","t":"초기교회의 인내와 발효 (알렌 크라이더)","s":"``` 인내 → 아비투스 → 교리교육·예배 → 발효(성장) ```","c":"선교","u":"2026-05-05","l":18,"p":null,"a":"알렌 크라이더 [[people/알렌크라이더]]"},{"n":"초기기독교의예배와복음전도_크라이더","t":"초기 기독교의 예배와 복음전도 (알렌 크라이더)","s":"초기 기독교 성장의 원인 연구 (로드니 스타크: 3세기간 10년마다 40% 성장):","c":"선교","u":"2026-05-05","l":15,"p":null,"a":"알렌 크라이더"},{"n":"초대교회에길을묻다_크라이더","t":"초대교회에 길을 묻다 (알렌 크라이더)","s":"``` 하나님의 능력 + 생명을 주는 일탈 = 성장 우리의 설교나 예배가 아니라 변화된 삶이 사람들을 신앙으로 이끈다","c":"선교","u":"2026-05-05","l":18,"p":null,"a":"알렌 크라이더 [[people/알렌크라이더]]"},{"n":"친밀감_헨리나우웬","t":"친밀감 (Intimacy)","s":"나우웬의 발달 단계론은 윤명숙 전도사님 설교에서 반복적으로 구현된다.","c":"상담·치유·가정","u":"2026-05-04","l":16,"p":null,"a":"헨리 나우웬"},{"n":"코로나바이러스세상하나님은어디에_존레녹스","t":"코로나 바이러스 세상, 하나님은 어디에 계실까 (존 레녹스)","s":"※ 둘은 연결된다: 탐욕 → 벌목 → 사막화 → 지구온난화 → 자연재해",     b.innerHTML=esc(c)+' <span class="n">'+(counts[c]||0)+'</span>';
    b.dataset.cat=c;
    b.onclick=()=>{state.cat=(state.cat===c?'':c);render()};
    catbar.appendChild(b);
  });
}
function setMode(m){
  if(state.mode===m)return;
  state.mode=m;state.cat='';
  $('tab-t').classList.toggle('active',m==='t');
  $('tab-b').classList.toggle('active',m==='b');
  $('tab-t').setAttribute('aria-selected',m==='t');
  $('tab-b').setAttribute('aria-selected',m==='b');
  buildCats();render();
}
$('tab-t').onclick=()=>setMode('t');
$('tab-b').onclick=()=>setMode('b');
$('q').addEventListener('input',e=>{state.q=norm(e.target.value);render()});
$('sort').addEventListener('change',e=>{state.sort=e.target.value;render()});
$('pubonly').addEventListener('click',e=>{state.pub=!state.pub;e.currentTarget.setAttribute('aria-pressed',state.pub);render()});
function render(){
  catbar.querySelectorAll('button').forEach(b=>b.classList.toggle('active',(b.dataset.cat||'')===state.cat));
  let rows=DATA[state.mode].filter(d=>
    (!state.cat||d.c===state.cat)&&
    (!state.pub||d.p)&&
    (!state.q||norm(d.n+' '+d.t+' '+(d.a||'')+' '+d.s+' '+d.c).includes(state.q)));
  if(state.sort==='name')rows.sort((a,b)=>a.n.localeCompare(b.n,'ko'));
  else if(state.sort==='links')rows.sort((a,b)=>b.l-a.l);
  else rows.sort((a,b)=>(b.u||'').localeCompare(a.u||''));
  $('result').textContent=rows.length+' / '+DATA[state.mode].length+'개 '+LABEL[state.mode]+
    (state.cat?' · '+state.cat:'')+(state.pub?' · 발행본 있음':'');
  $('grid').innerHTML=rows.length?rows.map(d=>{
    const nu=noteUrl(d);
    const pubLink=d.p?'<a class="read" href="'+d.p+'">✦ 발행본</a>':'';
    const author=d.a?'<div class="author">'+esc(d.a)+'</div>':'';
    return '<article class="card'+(d.p?' is-pub':'')+'"><div class="card-top"><span class="chip '+(state.mode==='t'?'cat-t':'cat-b')+'">'+esc(d.c)+'</span>'+
      '<span class="date">'+esc(d.u||'')+'</span></div>'+
      '<h3><a href="'+nu+'">'+esc(d.t)+'</a></h3>'+author+'<p>'+esc(d.s)+'</p>'+
      '<div class="card-foot"><span class="deg">연결 '+d.l+'</span>'+
      '<span class="links">'+pubLink+'<a class="read" href="'+nu+'">노트 읽기 →</a></span></div></article>';
  }).join(''):'<div class="empty">조건에 맞는 항목이 없습니다. 검색어나 필터를 조정해 보세요.</div>';
}
buildCats();render();
</script></body></html>
