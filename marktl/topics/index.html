·일·경영","u":"2026-05-06","l":7,"p":null,"a":"빌하이벨스"},{"n":"아이들의불안감","t":"아이들의 불안감","s":"아이들이 가장 두려워하는 것은 부모의 사랑을 잃고 버림받는 것이다.","c":"상담·치유·가정","u":"2026-05-04","l":10,"p":null,"a":"미표기"},{"n":"영혼돌봄의목회","t":"영혼돌봄의 목회","s":"“애도의 과정에서 세상을 다시 배우는 것은 상실과는 다르게, 세상 속에서 존재하고 행하는 방법을 새로 배우는 것이다.”","c":"상담·치유·가정","u":"2026-05-04","l":16,"p":null,"a":""},{"n":"예수가선택한십자가_맥스루케이도","t":"예수가 선택한 십자가 (He Chose the Nails) — 맥스 루케이도","s":"“목요제자반 독후감 — 이상협 집사”","c":"영성·제자도","u":"2026-05-06","l":7,"p":null,"a":"맥스루케이도"},{"n":"오픈시크릿","t":"오픈 시크릿 (The Open Secret)","s":"기독교 선교의 권위는 예수 그리스도의 이름에서 온다. 선교의 타당성을 인류의 통일·발전·해방 같은 외부 목적에서 찾는 것은 선교의 본질을 잃는 것이다.","c":"선교","u":"2026-04-17","l":8,"p":null,"a":"[[people/레슬리뉴비긴]]"},{"n":"오픈시크릿_레슬리뉴비긴","t":"오픈 시크릿 (The Open Secret)","s":"“\"당신은 무슨 권리로 우리에게 이 메시지를 전하는가?\" (막 11:28)”","c":"선교","u":"2026-05-05","l":13,"p":null,"a":"레슬리 뉴비긴"},{"n":"온라인사역을부탁해_케빈리","t":"온라인 사역을 부탁해","s":"“온라인보다 사역이 목표 — 교회의 목표와 동일하게 세팅”","c":"영성·제자도","u":"2026-05-05","l":11,"p":null,"a":"케빈 리"},{"n":"요나의심판과구원_자끄엘륄","t":"요나의 심판과 구원","s":"이것이 엘륄이 요나서 1장 1절(\"하나님의 말씀이 요나에게 임하니라\")에서 뽑아낸 선택론의 핵심이다.","c":"선교","u":"2026-05-05","l":14,"p":null,"a":"자끄 엘륄"},{"n":"위기의십대기회의십대_폴트립","t":"위기의 십대 기회의 십대","s":"우리의 우상이 하나님이 주신 기회를 애매한 고통이라고 생각하게 만든다.","c":"상담·치유·가정","u":"2026-05-05","l":19,"p":null,"a":"폴 트립"},{"n":"의학과치유_마틴로이드존스","t":"의학과 치유","s":"마틴 로이드 존스는 의사 출신 목사다. 런던 바솔로뮤 병원에서 수련받고 실제 임상의로 일하다가 복음 사역으로 전환했다.","c":"상담·치유·가정","u":"2026-05-05","l":15,"p":null,"a":"마틴 로이드 존스"},{"n":"이별상담_출처미상","t":"사람들이 잘 이별할 수 있도록","s":"“상담자는 내담자가 잘 이별하도록 도울 뿐 아니라, 이별을 통보받은 사람도 도와야 한다.”","c":"상담·치유·가정","u":"2026-05-03","l":4,"p":null,"a":"출처 미상"},{"n":"이보다좋은복은없다_옥한흠","t":"이보다 좋은 복은 없다 — 옥한흠","s":"에베소서 1장을 중심으로 한 구원의 복 묵상.","c":"영성·제자도","u":"2026-05-06","l":9,"p":null,"a":"옥한흠"},{"n":"인비저블처치_김성규","t":"인비저블 처치 (Invisible Church)","s":"초대교회가 목적을 가지고 찾아가서 세운 첫 번째 교회는 빌립의 사마리아 교회다. 예수님도 거절당하셨던 그 땅, 하나님으로부터 멀리 떠났던 그곳에 먼저 찾아갔다.","c":"선교","u":"2026-06-02","l":20,"p":null,"a":"김성규"},{"n":"잊혀진교회의길","t":"잊혀진 교회의 길 (The Forgotten Ways)","s":"초대교회와 현대 중국 지하교회가 폭발적으로 성장한 이유는 mDNA(선교적 DNA)를 갖고 있었기 때문. 서구 교회는 이 사도적 특성을 잃어버렸다","c":"선교","u":"2026-04-17","l":8,"p":null,"a":"[[people/앨런허쉬]]"},{"n":"잊혀진교회의길_앨런허쉬","t":"잊혀진 교회의 길 (The Forgotten Ways)","s":"``` 그리스도가 누구인가? ↓ 어떻게 선교하는가? ↓ 교회는 어떤 형태여야 하는가? ```","c":"선교","u":"2026-05-05","l":28,"p":null,"a":"앨런 허쉬"},{"n":"자녀의마음을여는열쇠_게리스몰리","t":"자녀의 마음을 여는 열쇠","s":"게리 스몰리의 중심 개념은 자녀의 영혼(soul)이 부모를 향해 열려 있는가 닫혀 있는가다. 훈계의 기술보다","c":"상담·치유·가정","u":"2026-05-05","l":13,"p":null,"a":"게리 스몰리"},{"n":"자녀훈련18계명_이기복","t":"자녀 훈련 18계명 (이기복 교수의 성경적 부모교실)","s":"부모의 훈계는 자녀를 외적으로 통제하기 위한 것이 아니라, 자녀가 스스로 자신을 다스릴 수 있는 사람으로 자라도록 내적 역량을 형성하는 것이다.","c":"상담·치유·가정","u":"2026-05-05","l":16,"p":null,"a":"이기복 교수"},{"n":"장로직을다시생각하다","t":"장로직을 다시 생각하다","s":"장로제는 신약 교회의 중심 구조가 아니었다. 초기 교회를 이끈 것은 장로가 아닌 교회개척자(church planter)였다.","c":"리더십·일·경영","u":"2026-05-05","l":11,"p":null,"a":""},{"n":"전도서_크리스토퍼라이트","t":"전도서 — 크리스토퍼 라이트","s":"전도서는 절망의 책이 아니다. 질문하는 믿음(Questioning Faith) — 허무주의의 심연을 직시하면서도 신앙인으로 남아, 결국 믿음이 승리하는 이야기다.","c":"신학·사회","u":"2026-05-05","l":22,"p":null,"a":"크리스토퍼 라이트"},{"n":"정치공간에그리스도인으로서기","t":"정치 공간에 그리스도인으로 서기","s":"왜 그렇게 되는가? 말씀보다 이데올로기를 더 신뢰하기 때문이다.","c":"교회·공동체","u":"2026-05-05","l":26,"p":"https://wiki.youngdoctor.kr/marktl/%EC%A0%95%EC%B9%98%EA%B3%B5%EA%B0%84%EC%97%90%EA%B7%B8%EB%A6%AC%EC%8A%A4%EB%8F%84%EC%9D%B8%EC%9C%BC%EB%A1%9C%EC%84%9C%EA%B8%B0/","a":""},{"n":"제멋대로인요즘아이말씀으로양육하라_휴게이트","t":"제멋대로인 요즘아이 말씀으로 양육하라 (J. 리차드 휴게이트)","s":"``` 하나님 (궁극적 권위) ↓ 정부 · 결혼 · 부모 (제도적 권위) ↓ 자녀 (복종의 위치) ```","c":"상담·치유·가정","u":"2026-05-05","l":12,"p":null,"a":"J. 리차드 휴게이트"},{"n":"조직신학-웨인그루뎀","t":"조직신학 (Systematic Theology)","s":"\"주어진 주제에 관해서 성경 전체가 오늘날 우리들에게 무엇을 가르치는가?\"","c":"리더십·일·경영","u":"2026-04-16","l":13,"p":null,"a":"웨인 그루뎀"},{"n":"중독행동보상경험고찰_김재환","t":"중독행동이 보상경험과 심리적 기능에 대한 고찰","s":"유아 자아발달 4단계: ``` 자폐기 → 공생기 → 분리개별화 → 대상항상성(독립된 자아) ```","c":"상담·치유·가정","u":"2026-05-06","l":8,"p":null,"a":"김재환"},{"n":"직장인이라면다니엘처럼","t":"직장인이라면 다니엘처럼","s":"→ 핵심 통찰: 수용할 것과 거부할 것을 분별하는 지혜 격리가 아니라 대안 제시 — 창의적 타협이 아닌 창의적 대안","c":"선교","u":"2026-05-05","l":12,"p":null,"a":""},{"n":"창조타락구속_월터스","t":"창조, 타락, 구속 (알버트 월터스)","s":"하나님의 법이 세계를 지배하는 방식 2가지: - 자연법칙: 비인간 영역 — 직접적·강제적 - 규범: 문화·사회 영역 — 매개적, 인간이 하나님의 동역자","c":"선교","u":"2026-05-05","l":25,"p":null,"a":"알버트 월터스"},{"n":"처치시프트_이상훈","t":"처치 시프트 (이상훈)","s":"포스트모던 시대에 종교적 관심은 높아졌다: - 개인의 영적 신비와 체험 강조 - \"어떤 신이 진짜인가?\" — 종교 다원주의 확산","c":"선교","u":"2026-05-05","l":19,"p":null,"a":"이상훈"},{"n":"초기교회의인내와발효_크라이더","t":"초기교회의 인내와 발효 (알렌 크라이더)","s":"``` 인내 → 아비투스 → 교리교육·예배 → 발효(성장) ```","c":"선교","u":"2026-05-05","l":18,"p":null,"a":"알렌 크라이더 [[people/알렌크라이더]]"},{"n":"초기기독교의예배와복음전도_크라이더","t":"초기 기독교의 예배와 복음전도 (알렌 크라이더)","s":"초기 기독교 성장의 원인 연구 (로드니 스타크: 3세기간 10년마다 40% 성장):","c":"선교","u":"2026-05-05","l":15,"p":null,"a":"알렌 크라이더"},{"n":"초대교회에길을묻다_크라이더","t":"초대교회에 길을 묻다 (알렌 크라이더)","s":"``` 하나님의 능력 + 생명을 주는 일탈 = 성장 우리의 설교나 예배가 아니라 변화된 삶이 사람들을 신앙으로 이끈다","c":"선교","u":"2026-05-05","l":18,"p":null,"a":"알렌 크라이더 [[people/알렌크라이더]]"},{"n":"친밀감_헨리나우웬","t":"친밀감 (Intimacy)","s":"나우웬의 발달 단계론은 윤명숙 전도사님 설교에서 반복적으로 구현된다.","c":"상담·치유·가정","u":"2026-05-04","l":16,"p":null,"a":"헨리 나우웬"},{"n":"코로나바이러스세상하나님은어디에_존레녹스","t":"코로나 바이러스 세상, 하나님은 어디에 계실까 (존 레녹스)","s":"※ 둘은 연결된다: 탐욕 → 벌목 → 사막화 → 지구온난화 → 자연재해","c":"신학·사회","u":"2026-05-05","l":16,"p":null,"a":"존 레녹스"},{"n":"태극기를흔드는그리스도인","t":"태극기를 흔드는 그리스도인 (개신교 극우 현상의 배경과 형성 그리고 극복)","s":"저자들이 거듭 강조하는 사실 하나: 태극기 집회 참가자는 전체 개신교인의 3-4%(p.57)에 불과하고, \"스스로 극우라고 응답한 사람은 18.9퍼센트\"(p.56)뿐이다.","c":"교회·공동체","u":"2026-06-24","l":42,"p":"https://wiki.youngdoctor.kr/marktl/%ED%83%9C%EA%B7%B9%EA%B8%B0%EB%A5%BC%ED%9D%94%EB%93%9C%EB%8A%94%EA%B7%B8%EB%A6%AC%EC%8A%A4%EB%8F%84%EC%9D%B8/","a":""},{"n":"팬인가제자인가_카일아이들먼","t":"팬인가 제자인가 (Not a Fan) — 카일 아이들먼","s":"“목요제자반 독후감 — 이상협 집사”","c":"상담·치유·가정","u":"2026-05-06","l":6,"p":null,"a":"카일아이들먼"},{"n":"평신도를깨운다_옥한흠","t":"평신도를 깨운다 — 옥한흠","s":"“목요제자반 독후감 — 이상협 집사”","c":"영성·제자도","u":"2026-05-06","l":9,"p":null,"a":"옥한흠"},{"n":"프로젝트티모티","t":"프로젝트 티모티","s":"딤전 3:1 — 감독의 직분을 얻으려 함 = 선한 일을 사모하는 것","c":"리더십·일·경영","u":"2026-05-05","l":20,"p":null,"a":""},{"n":"하나님백성의선교","t":"하나님 백성의 선교 (하백선)","s":"선교를 '특별한 사람이 특별한 장소에서 하는 특별한 사역'이라는 편견에서 벗어나, 모든 백성이 모든 장소에서 모든 영역에서 감당하는 부르심으로 재정의.","c":"선교","u":"2026-05-11","l":6,"p":null,"a":"크리스토퍼 라이트"},{"n":"하나님은월요일에무슨일을하실까_이안코피","t":"하나님은 월요일에 무슨 일을 하실까?","s":"바꾸어 말하면: > \"당신은 주일 오전 11시만큼, 월요일 오전 11시가 즐겁습니까?\"","c":"리더십·일·경영","u":"2026-05-05","l":12,"p":null,"a":"이안 코피"},{"n":"하나님의공동선_송용원","t":"하나님의 공동선 — 송용원","s":"칼뱅의 비유: 성경이라는 안경 > 육안으로 보면 세상만 보인다. 교정된 눈(영안)으로 보면 세상과 더불어 하나님 나라가 함께 보인다.","c":"리더십·일·경영","u":"2026-05-05","l":19,"p":null,"a":"송용원"},{"n":"하나님의선교전략_도널드맥가브란","t":"하나님의 선교전략 (The Bridges of God) — 도널드 맥가브란","s":"맥가브란은 교회 성장학(Church Growth Movement)의 창시자. 핵심 주장: 선교 기지(mission station) 중심에서 교회 중심으로의 패러다임 전환 요청.","c":"선교","u":"2026-05-05","l":17,"p":null,"a":"도널드맥가브란"},{"n":"하박국_크리스토퍼라이트","t":"하박국 — 크리스토퍼 라이트","s":"하박국은 욥처럼 하나님께 직언한다. 욥은 두려움과 압박감 속에서 질문했으나, 하박국은 대답을 들을 때까지 질문한다.","c":"신학·사회","u":"2026-05-06","l":21,"p":null,"a":"크리스토퍼 라이트"},{"n":"하프타임_밥버포드","t":"하프 타임 (Halftime) — 밥 버포드","s":"핵심 질문에 아직 '네'라고 확실히 대답할 수 없다. 그러나 예수 안에서 선한 일을 위하여 지으심 받았다는 것에는 동의한다.","c":"리더십·일·경영","u":"2026-05-06","l":6,"p":null,"a":"밥버포드"},{"n":"행복한가정의탄생_찰스스윈돌","t":"행복한 가정의 탄생 — 찰스 스윈돌","s":"시대 진단: - 남자인 것을 두려워하는 남자들 - 여자인 것을 억울해하는 여자들 - 누구의 권위에 순종해야 할지 모르는 아이들 - 전쟁터가 되어버린 가정들","c":"상담·치유·가정","u":"2026-05-06","l":13,"p":null,"a":"찰스스윈돌"},{"n":"화해의제자도_카통골레라이스","t":"화해의 제자도 — 에마뉘엘 카통골레·크리스 라이스","s":"화해는 선물(gift)이자 여정(journey)이다. 전략이나 기법, 사건이 아니다. 가장 먼저 해야 할 말은 전략이 아니라 기도(탄식)다.","c":"영성·제자도","u":"2026-05-06","l":16,"p":null,"a":"에마뉘엘 카통골레"},{"n":"교회란무엇인가","t":"교회란 무엇인가","s":"뉴비긴은 교회의 본질을 에클레시아(ἐκκλησία, 불려 나온 자들의 모임) 개념에서 시작한다. 교회는 세상 속에서 불려 나온 공동체이자 동시에 세상을 향해 파송된 공동체다.","c":"선교","u":"2026-06-28","l":11,"p":null,"a":""},{"n":"기독교변증학","t":"기독교 변증학","s":"이 책은 변증학을 논증 기술이 아니라 진리에 대한 지적 정직성과 인격적 사랑이 함께 작동해야 하는 신앙의 실천으로 규정한다.","c":"신학·사회","u":"2026-07-03","l":12,"p":null,"a":""},{"n":"대위임령현황보고서_동아시아","t":"동아시아 지역 보고서 — 대위임령 현황","s":"“로잔운동 공식 지역 보고서 | 2024 L4 서울-인천 저자: 볼로르투야 담딘자브(몽골)·최형근·한철호(한국)·구라사와 마사노리(일본)·데이비드 로·바네사 링(홍콩) 대상 지역: 중국·한국·북한·일본·홍콩·마카오·대만·몽골 원본: `raw/books/대위임령현황보고서_동아시아.md`”","c":"선교","u":"2026-06-07","l":7,"p":null,"a":"동아시아"},{"n":"새포도주는새부대에","t":"새 포도주는 새 부대에 (하워드 스나이더)","s":"변화 속의 교회가 지켜야 할 본질은 가정에서 모이는 유기적 소그룹. 교회 갱신이 안 되는 이유는 새것을 배우지 않아서가 아니라 \"과거의 가죽부대를 놓지 않아서\"(scripture/마9) — 옛것을 중단해 공백을 만들어야 성령이 일할 공간이 생긴다.","c":"교회·공동체","u":"2026-07-13","l":7,"p":null,"a":""},{"n":"선교에대한네가지견해_1부_리먼_구원론적선교","t":"선교에 대한 네 가지 견해 · 1부 — 구원론적 선교 (조너선 리먼)","s":"각 장마다 본문 뒤에 나머지 세 저자의 논평이 붙는다 (제1장: 라이트 p.78 · 프랭키 p.88 · 라잇하르트 p.96).","c":"선교","u":"2026-06-19","l":44,"p":"https://wiki.youngdoctor.kr/marktl/%EC%84%A0%EA%B5%90%EC%97%90%EB%8C%80%ED%95%9C%EB%84%A4%EA%B0%80%EC%A7%80%EA%B2%AC%ED%95%B4-1%EB%B6%80-%EB%A6%AC%EB%A8%BC-%EA%B5%AC%EC%9B%90%EB%A1%A0%EC%A0%81%EC%84%A0%EA%B5%90/","a":""},{"n":"선교에대한네가지견해_2부_라이트_참여선교","t":"선교에 대한 네 가지 견해 · 2부 — 참여 선교 (크리스토퍼 라이트)","s":"라이트는 『하나님의 선교』에서 전개한 선교적 성경 해석학을 토론서 형식으로 압축한다. 핵심 명제: 교회는 하나님의 선교를 위해 존재하며, 그 사명은 성경 전체 이야기에 '참여'하는 것이다.","c":"선교","u":"2026-06-19","l":40,"p":"https://wiki.youngdoctor.kr/marktl/%EC%84%A0%EA%B5%90%EC%97%90%EB%8C%80%ED%95%9C%EB%84%A4%EA%B0%80%EC%A7%80%EA%B2%AC%ED%95%B4-2%EB%B6%80-%EB%9D%BC%EC%9D%B4%ED%8A%B8-%EC%B0%B8%EC%97%AC%EC%84%A0%EA%B5%90/","a":""},{"n":"선교에대한네가지견해_3부_프랭키_상황중심선교","t":"선교에 대한 네 가지 견해 · 3부 — 상황 중심 선교 (존 프랭키)","s":"프랭키는 뉴비긴과 앤드루 월스의 선교적 해석학을 급진화하여, 복음의 '무한한 번역 가능성'과 다원성을 선교론의 중심에 놓는다.","c":"선교","u":"2026-06-20","l":34,"p":"https://wiki.youngdoctor.kr/marktl/%EC%84%A0%EA%B5%90%EC%97%90%EB%8C%80%ED%95%9C%EB%84%A4%EA%B0%80%EC%A7%80%EA%B2%AC%ED%95%B4-3%EB%B6%80-%ED%94%84%EB%9E%AD%ED%82%A4-%EC%83%81%ED%99%A9%EC%A4%91%EC%8B%AC%EC%84%A0%EA%B5%90/","a":""},{"n":"선교에대한네가지견해_4부_라잇하르트_성례전적선교","t":"선교에 대한 네 가지 견해 · 4부 — 성례전적 선교 (피터 라잇하르트) + 결론","s":"라잇하르트의 핵심 주장: 선교론은 세례와 성찬을 중심에 두어야 한다. 그는 광범위 선교를 옹호하는 수정주의자(라이트·프랭키)와 좁은 선교를 옹호하는 전통주의자(드영·길버트)를 모두 비판한다","c":"선교","u":"2026-06-19","l":30,"p":"https://wiki.youngdoctor.kr/marktl/%EC%84%A0%EA%B5%90%EC%97%90%EB%8C%80%ED%95%9C%EB%84%A4%EA%B0%80%EC%A7%80%EA%B2%AC%ED%95%B4-4%EB%B6%80-%EB%9D%BC%EC%9E%87%ED%95%98%EB%A5%B4%ED%8A%B8-%EC%84%B1%EB%A1%80%EC%A0%84%EC%A0%81%EC%84%A0%EA%B5%90/","a":""},{"n":"선교적공동체세우기_미셔널신학연구소","t":"선교적 공동체 세우기 — 미셔널신학연구소 (BOOKK)","s":"\"'미씨오'(missio)라는 라틴어…본래 '파송', '보냄'이라는 의미\"(p.16). 저자는 '선교적'이라는 번역이 아쉽다고 본다","c":"선교","u":"2026-06-21","l":21,"p":"https://wiki.youngdoctor.kr/marktl/%EC%84%A0%EA%B5%90%EC%A0%81%EA%B3%B5%EB%8F%99%EC%B2%B4%EC%84%B8%EC%9A%B0%EA%B8%B0_%EB%AF%B8%EC%85%94%EB%84%90%EC%8B%A0%ED%95%99%EC%97%B0%EA%B5%AC%EC%86%8C/","a":""},{"n":"성경해석학","t":"성경해석학 (교재)","s":"MBTS lectures/MBTS/성경해석학개론에서 사용된 성경해석학 교재. 해석의 핵심 용어, 문학 장르별 해석(시편의 평행법·언약·예표론), 저자 의도와 적용의 문제 등을 다룬다.","c":"신학·사회","u":"2026-07-04","l":3,"p":null,"a":""},{"n":"소그룹과교회성장","t":"소그룹과 교회성장 (론 니콜라스·랄프 네이버, 원제 Cell Church)","s":"교회의 구조와 건강한 성장 — 셀(소그룹)을 교회의 기본 단위로 삼는 구조론. 소그룹은 교회의 본질이며, 평신도 리더십을 세울 때 신앙은 자연스럽게 확산된다.","c":"교회·공동체","u":"2026-07-13","l":3,"p":null,"a":""},{"n":"에베소서선교적읽기_한종석","t":"에베소서 선교적 읽기 — 한종석 (한국해외선교회출판부)","s":"저자는 파키스탄 선교사로 '불가촉천민의 후손'인 펀자비(Punjabi) 기독교인들과 살면서, 그들이 가진 세 겹의 정체성 — \"기독교 종족으로서의 정체성, 사회적으로 하부 계층을 이루고 있는 사회·경제적인 정체성, 그리스도를 구주로 고백하는 영적인 정체성\"(p.12) — 사이의 긴장을 목격했다.","c":"선교","u":"2026-06-21","l":26,"p":"https://wiki.youngdoctor.kr/marktl/%EC%97%90%EB%B2%A0%EC%86%8C%EC%84%9C%EC%84%A0%EA%B5%90%EC%A0%81%EC%9D%BD%EA%B8%B0_%ED%95%9C%EC%A2%85%EC%84%9D/","a":"한종석"},{"n":"예수님의제자훈련","t":"예수님의 제자훈련 (찬타필라)","s":"제자도의 전수(transmission)에 초점 — 소수와의 깊은 관계성, 상황의 공유를 통해 제자도가 이어진다.","c":"영성·제자도","u":"2026-07-13","l":4,"p":null,"a":""},{"n":"오직고통당하는하나님만이_비노스라마찬드라","t":"오직 고통당하는 하나님만이 — 비노스 라마찬드라 (IVP)","s":"라마찬드라는 고통을 '설명'하려는 이론적 신정론을 거부한다. \"왜?\"라는 질문은 답을 요구하는 지적 탐구가 아니라 침묵하시는 하나님 앞의 실존적 고뇌이기 때문이다.","c":"리더십·일·경영","u":"2026-06-28","l":23,"p":"https://wiki.youngdoctor.kr/marktl/%EC%98%A4%EC%A7%81%EA%B3%A0%ED%86%B5%EB%8B%B9%ED%95%98%EB%8A%94%ED%95%98%EB%82%98%EB%8B%98%EB%A7%8C%EC%9D%B4_%EB%B9%84%EB%85%B8%EC%8A%A4%EB%9D%BC%EB%A7%88%EC%B0%AC%EB%93%9C%EB%9D%BC/","a":""},{"n":"우리편편향_키스스타노비치","t":"우리편 편향 — 키스 E. 스타노비치 (바다출판사)","s":"저자는 시대 진단을 정면으로 교정한다. 2016년 이후 모두가 '탈진실(post-truth)'을 탄식했지만(p.15), 스타노비치는 다르게 본다.","c":"신학·사회","u":"2026-06-24","l":28,"p":"https://wiki.youngdoctor.kr/marktl/%EC%9A%B0%EB%A6%AC%ED%8E%B8%ED%8E%B8%ED%96%A5_%ED%82%A4%EC%8A%A4%EC%8A%A4%ED%83%80%EB%85%B8%EB%B9%84%EC%B9%98/","a":"키스스타노비치"},{"n":"조직신학","t":"조직신학 (Systematic Theology)","s":"웨인 그루뎀의 조직신학은 복음주의 개혁신학의 관점에서 성경 전체의 가르침을 체계적으로 정리한 표준 교재다. 황성철 교수의 MBTS 강의는 이 교재를 기반으로 신학의 전 영역을 7대 교리 체계로 구성한다.","c":"리더십·일·경영","u":"2026-06-28","l":7,"p":null,"a":""},{"n":"존재만으로특별한다문화교회_신치헌","t":"존재만으로 특별한 다문화 교회 — 신치헌 (이레서원, 2025)","s":"한 교회의 영어 예배부였던 작은 부서가 다문화 교회(시티센터교회)로 세워지기까지의 과정과, 이주민과 '함께하는' 선교(mission with the migrants)의 신학·실천을 담은 사역 보고서.","c":"선교","u":"2026-06-17","l":28,"p":"https://wiki.youngdoctor.kr/marktl/%EC%A1%B4%EC%9E%AC%EB%A7%8C%EC%9C%BC%EB%A1%9C%ED%8A%B9%EB%B3%84%ED%95%9C%EB%8B%A4%EB%AC%B8%ED%99%94%EA%B5%90%ED%9A%8C-%EC%8B%A0%EC%B9%98%ED%97%8C/","a":"신치헌"},{"n":"종교개혁_최종원","t":"종교개혁 (최종원)","s":"“※ 스텁 — 직접 독서 노트 아님. 조샘의 북대담 후기를 통해 간접 인제스트됨. 원서를 읽으면 이 페이지를 정식 북노트로 확장할 것.”","c":"교회·공동체","u":"2026-07-13","l":5,"p":null,"a":"최종원"},{"n":"팀켈러의설교","t":"팀켈러의 설교","s":"MBTS 강해설교 강의들에서 이 책은 두 차례에 걸쳐 직접 인용·참조된다.","c":"교회·공동체","u":"2026-06-28","l":9,"p":null,"a":""},{"n":"하나님과판데믹","t":"하나님과 팬데믹","s":"톰 라이트는 팬데믹을 \"하나님의 심판\"이나 \"종말의 징조\"로 해석하는 신속한 신학적 답변들에 저항한다. 그의 핵심 주장은 탄식(lament)이 먼저라는 것이다.","c":"신학·사회","u":"2026-06-28","l":8,"p":null,"a":""},{"n":"하나님나라와하나님의선교_정민영","t":"하나님 나라와 하나님의 선교 — 정민영 (IVP, 2024)","s":"선교학 개론서. 선교를 인간의 활동이 아니라 삼위 하나님의 일(missio Dei)로 재정의하고, 그 출발점·원천·목적을 모두 하나님께 돌리는 신본주의 관점을 일관되게 전개한다.","c":"선교","u":"2026-06-16","l":27,"p":"https://wiki.youngdoctor.kr/marktl/%ED%95%98%EB%82%98%EB%8B%98%EB%82%98%EB%9D%BC%EC%99%80%ED%95%98%EB%82%98%EB%8B%98%EC%9D%98%EC%84%A0%EA%B5%90-%EC%A0%95%EB%AF%BC%EC%98%81/","a":"정민영"},{"n":"하나님의선교세상을바꾸다_크리스토퍼라이트","t":"하나님의 선교, 세상을 바꾸다 — 크리스토퍼 라이트 (Christopher J. H. Wright)","s":"'선교(mission)'는 성경에 등장하지 않는 단어이지만, '삼위일체'가 그렇듯 성경 전체가 가리키는 실재를 담는 그릇이다.","c":"선교","u":"2026-06-15","l":27,"p":"https://wiki.youngdoctor.kr/marktl/%ED%95%98%EB%82%98%EB%8B%98%EC%9D%98%EC%84%A0%EA%B5%90%EC%84%B8%EC%83%81%EC%9D%84%EB%B0%94%EA%BE%B8%EB%8B%A4-%ED%81%AC%EB%A6%AC%EC%8A%A4%ED%86%A0%ED%8D%BC%EB%9D%BC%EC%9D%B4%ED%8A%B8/","a":""},{"n":"한국개신교근본주의_배덕만","t":"한국개신교근본주의 — 배덕만 (대장간)","s":"저자의 출발 명제는 도발적이다 — \"한국교회의 70-80%는 근본주의 교회라고 봐야 한다\"(p.8). 그 \"근본주의적 속성 및 잔재 때문에, 한국 사회와 문화에 건강하고 책임 있게 뿌리내리지 못했다\"(p.8).","c":"리더십·일·경영","u":"2026-06-24","l":17,"p":"https://wiki.youngdoctor.kr/marktl/%ED%95%9C%EA%B5%AD%EA%B0%9C%EC%8B%A0%EA%B5%90%EA%B7%BC%EB%B3%B8%EC%A3%BC%EC%9D%98_%EB%B0%B0%EB%8D%95%EB%A7%8C/","a":"배덕만"}]};
const CATS={"t": ["조직신학·교리", "성경·해석", "선교", "교회사", "윤리·공공", "변증·철학", "목회·실천", "영성·제자도", "상담·가정"], "b": ["선교", "상담·치유·가정", "리더십·일·경영", "신학·사회", "영성·제자도", "교회·공동체"]};
const HUE={"조직신학·교리": 226, "성경·해석": 174, "선교": 18, "교회사": 38, "윤리·공공": 300, "변증·철학": 206, "목회·실천": 140, "영성·제자도": 345, "상담·가정": 25, "상담·치유·가정": 25, "리더십·일·경영": 226, "신학·사회": 300, "교회·공동체": 140};
const BASE='';
const LABEL={t:'주제',b:'북노트'};
const $=id=>document.getElementById(id);
const state={mode:'t',q:'',cat:'',pub:false,sort:'name'};
const norm=s=>(s||'').normalize('NFC').toLowerCase();
const esc=t=>(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const noteUrl=d=>BASE+(state.mode==='t'?'t/':'b/')+encodeURIComponent(d.n)+'/';
const catbar=$('cats');
function buildCats(){
  const rows=DATA[state.mode];
  const counts={};rows.forEach(d=>counts[d.c]=(counts[d.c]||0)+1);
  catbar.innerHTML='';
  const all=document.createElement('button');all.type='button';
  all.innerHTML='전체 <span class="n">'+rows.length+'</span>';
  all.onclick=()=>{state.cat='';render()};
  catbar.appendChild(all);
  CATS[state.mode].forEach(c=>{
    const b=document.createElement('button');b.type='button';
    b.innerHTML=esc(c)+' <span class="n">'+(counts[c]||0)+'</span>';
    b.dataset.cat=c;
    b.onclick=()=>{state.cat=(state.cat===c?'':c);render()};
    catbar.appendChild(b);
  });
}
function setMode(m){
  if(state.mode===m)return;
  state.mode=m;state.cat='';
  $('tab-t').classList.toggle('active',m==='t');
  $('tab-b').classList.toggle('active',m==='b');
  $('tab-t').setAttribute('aria-selected',m==='t');
  $('tab-b').setAttribute('aria-selected',m==='b');
  buildCats();render();
}
$('tab-t').onclick=()=>setMode('t');
$('tab-b').onclick=()=>setMode('b');
$('q').addEventListener('input',e=>{state.q=norm(e.target.value);render()});
$('sort').addEventListener('change',e=>{state.sort=e.target.value;render()});
$('pubonly').addEventListener('click',e=>{state.pub=!state.pub;e.currentTarget.setAttribute('aria-pressed',state.pub);render()});
function render(){
  catbar.querySelectorAll('button').forEach(b=>b.classList.toggle('active',(b.dataset.cat||'')===state.cat));
  let rows=DATA[state.mode].filter(d=>
    (!state.cat||d.c===state.cat)&&
    (!state.pub||d.p)&&
    (!state.q||norm(d.n+' '+d.t+' '+(d.a||'')+' '+d.s+' '+d.c).includes(state.q)));
  if(state.sort==='name')rows.sort((a,b)=>a.n.localeCompare(b.n,'ko'));
  else if(state.sort==='links')rows.sort((a,b)=>b.l-a.l);
  else rows.sort((a,b)=>(b.u||'').localeCompare(a.u||''));
  $('result').textContent=rows.length+' / '+DATA[state.mode].length+'개 '+LABEL[state.mode]+
    (state.cat?' · '+state.cat:'')+(state.pub?' · 발행본 있음':'');
  $('grid').innerHTML=rows.length?rows.map(d=>{
    const nu=noteUrl(d);
    const pubLink=d.p?'<a class="read" href="'+d.p+'">✦ 발행본</a>':'';
    const author=d.a?'<div class="author">'+esc(d.a)+'</div>':'';
    return '<article class="card"><div class="card-top"><span class="chip" style="--h:'+(HUE[d.c]||220)+'">'+esc(d.c)+'</span>'+
      '<span class="date">'+esc(d.u||'')+'</span></div>'+
      '<h3><a href="'+nu+'">'+esc(d.t)+'</a></h3>'+author+'<p>'+esc(d.s)+'</p>'+
      '<div class="card-foot"><span class="deg">연결 '+d.l+'</span>'+
      '<span class="links">'+pubLink+'<a class="read" href="'+nu+'">노트 읽기 →</a></span></div></article>';
  }).join(''):'<div class="empty">조건에 맞는 항목이 없습니다. 검색어나 필터를 조정해 보세요.</div>';
}
buildCats();render();
</script></body></html>
