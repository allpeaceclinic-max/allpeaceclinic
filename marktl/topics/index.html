<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>주제 위키 탐색 — youngdoctorArchive</title></head><body>
<style>
:root{
  --bg:#f7f6f1; --surface:#fffefb; --ink:#1d2433; --muted:#636b76;
  --accent:#2c4a8a; --accent-ink:#fff; --line:#e2dfd4; --line-soft:#eceadfa8;
  --chip-l1:90%; --chip-l2:30%; --chip-s1:38%; --chip-s2:46%;
  --shadow:0 10px 28px rgba(29,36,51,.06);
}
@media (prefers-color-scheme:dark){:root{
  --bg:#14161c; --surface:#1d212b; --ink:#e8e6dd; --muted:#98a0ac;
  --accent:#93ace4; --accent-ink:#111726; --line:#2b303c; --line-soft:#262b36;
  --chip-l1:21%; --chip-l2:76%; --chip-s1:22%; --chip-s2:42%;
  --shadow:0 10px 28px rgba(0,0,0,.28);
}}
:root[data-theme="dark"]{
  --bg:#14161c; --surface:#1d212b; --ink:#e8e6dd; --muted:#98a0ac;
  --accent:#93ace4; --accent-ink:#111726; --line:#2b303c; --line-soft:#262b36;
  --chip-l1:21%; --chip-l2:76%; --chip-s1:22%; --chip-s2:42%;
  --shadow:0 10px 28px rgba(0,0,0,.28);
}
:root[data-theme="light"]{
  --bg:#f7f6f1; --surface:#fffefb; --ink:#1d2433; --muted:#636b76;
  --accent:#2c4a8a; --accent-ink:#fff; --line:#e2dfd4; --line-soft:#eceadfa8;
  --chip-l1:90%; --chip-l2:30%; --chip-s1:38%; --chip-s2:46%;
  --shadow:0 10px 28px rgba(29,36,51,.06);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Malgun Gothic",sans-serif;
  line-height:1.55;-webkit-font-smoothing:antialiased}
main{max-width:1180px;margin:0 auto;padding:48px 22px 80px}
a{color:var(--accent)}
/* ── header ── */
header.top{border-top:3px solid var(--ink);padding-top:18px;margin-bottom:26px}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.14em;color:var(--accent);text-transform:uppercase}
h1{font-family:Georgia,"Nanum Myeongjo","AppleMyungjo",Batang,"Noto Serif KR",serif;
  font-size:clamp(32px,5.4vw,56px);line-height:1.08;margin:10px 0 14px;text-wrap:balance;font-weight:700}
.lede{color:var(--muted);max-width:62ch;margin:0 0 18px;font-size:16px}
.stats{display:flex;flex-wrap:wrap;gap:0 28px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 0;font-size:14px;color:var(--muted)}
.stats b{color:var(--ink);font-variant-numeric:tabular-nums;font-size:16px;margin-right:5px}
/* ── toolbar ── */
.toolbar{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--bg) 92%,transparent);
  backdrop-filter:blur(10px);padding:14px 0 10px;margin:8px 0 6px;border-bottom:1px solid var(--line-soft)}
.row1{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.row1 input[type=search]{flex:1 1 260px;min-width:0;border:1px solid var(--line);border-radius:8px;
  padding:11px 14px;font-size:16px;background:var(--surface);color:var(--ink)}
.row1 input[type=search]:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
.row1 select{border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--surface);color:var(--ink);cursor:pointer}
button.pubtoggle{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:999px;
  padding:9px 14px;font-size:14px;cursor:pointer;white-space:nowrap}
button.pubtoggle[aria-pressed=true]{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.catbar{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.catbar button{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:999px;
  padding:6px 12px;font-size:13.5px;cursor:pointer}
.catbar button .n{color:var(--muted);font-variant-numeric:tabular-nums;margin-left:4px;font-size:12px}
.catbar button.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.catbar button.active .n{color:inherit;opacity:.75}
.result{margin:14px 2px 12px;font-size:13.5px;color:var(--muted);font-variant-numeric:tabular-nums}
/* ── grid & cards ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));gap:14px}
.card{display:flex;flex-direction:column;gap:9px;background:var(--surface);border:1px solid var(--line);
  border-radius:10px;padding:17px 18px 15px;box-shadow:var(--shadow);min-width:0}
.card-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.chip{--h:220;font-size:11.5px;font-weight:700;letter-spacing:.02em;border-radius:5px;padding:3px 8px;
  background:hsl(var(--h) var(--chip-s1) var(--chip-l1));color:hsl(var(--h) var(--chip-s2) var(--chip-l2));white-space:nowrap}
.hue0{--h:226}
.hue1{--h:174}
.hue2{--h:18}
.hue3{--h:38}
.hue4{--h:300}
.hue5{--h:206}
.hue6{--h:140}
.hue7{--h:345}
.hue8{--h:25}
.card .date{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.card h3{margin:0;font-size:17.5px;line-height:1.32;font-weight:750;letter-spacing:-.01em;overflow-wrap:anywhere}
.card p{margin:0;font-size:13.8px;color:var(--muted);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{margin-top:auto;padding-top:10px;border-top:1px solid var(--line-soft);
  display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12.5px}
.deg{color:var(--muted);font-variant-numeric:tabular-nums}
a.read{font-weight:700;text-decoration:none;color:var(--accent)}
a.read:hover,a.read:focus-visible{text-decoration:underline}
.unpub{color:var(--muted);opacity:.75}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:56px 0;font-size:15px}
footer{margin-top:44px;padding-top:16px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:8px 20px;justify-content:space-between;font-size:13.5px;color:var(--muted)}
footer a{font-weight:700;text-decoration:none}
@media (prefers-reduced-motion:no-preference){.card{transition:transform .15s ease}.card:hover{transform:translateY(-2px)}}
</style>

<script>
const DATA=[{"n":"AI와신앙","t":"AI와 신앙","s":"","c":"영성·제자도","u":"2026-05-18","l":14,"p":null},{"n":"APNow","t":"AP Now (적극적 부모역할 프로그램)","s":"","c":"상담·가정","u":"2026-05-10","l":12,"p":null},{"n":"BAM","t":"BAM — Business as Mission","s":"","c":"선교","u":"2026-07-14","l":5,"p":null},{"n":"BAM전략","t":"BAM 전략 프레임워크","s":"- BAM(Business As Mission): 비즈니스를 선교의 수단이 아니라 선교 그 자체로 보는 패러다임 - 출발점: 성속 이원론(\"비즈니스=세속, 선교=거룩\") 극복","c":"선교","u":"2026-05-10","l":11,"p":null},{"n":"CMF_VPM철학","t":"CMF의 핵심: VPM 철학","s":"","c":"변증·철학","u":"2026-04-30","l":21,"p":null},{"n":"LLM위키","t":"LLM 위키 (LLM Wiki)","s":"","c":"변증·철학","u":"2026-04-17","l":2,"p":null},{"n":"Q자료","t":"Q자료 (Q-Source, Quelle)","s":"Q자료(독일어 Quelle, \"원천·출처\")는 마가복음에는 없으나 마태복음과 누가복음에 문자적으로 일치하는 예수의 가르침 구절 약 250개를 설명하기 위해 학자들이 가정한 가상의 문서 자료다.","c":"성경·해석","u":"2026-06-28","l":11,"p":null},{"n":"가정사역","t":"가정사역 (Family Ministry)","s":"가정 — 부부 관계, 부모-자녀 관계, 역기능 가정의 치유 — 을 하나님 나라의 기초 단위로 보고, 성경 원리에 따라 회복하는 사역.","c":"상담·가정","u":"2026-05-11","l":51,"p":null},{"n":"가족치료","t":"가족치료","s":"가족치료(family therapy)는 개인의 증상을 그 사람 안의 병리로 환원하지 않고, 그가 속한 가족을 하나의 살아 있는 체계(system)로 보아 관계 구조 속에서 문제를 이해하고 치료하는 임상 패러다임이다.","c":"상담·가정","u":"2026-07-14","l":37,"p":null},{"n":"강해설교","t":"강해설교","s":"성경 본문의 핵심 메시지와 저자의 의도를 효과적으로 전달하는 설교 방법론. 본문 중심의 원리를 기본으로 하되, 청중의 삶에 적용되고 변화를 일으키는 것을 목표로 한다.","c":"목회·실천","u":"2026-05-12","l":40,"p":null},{"n":"거듭남","t":"거듭남","s":"거듭남은 요한복음 3장의 언어다.","c":"조직신학·교리","u":"2026-07-14","l":41,"p":null},{"n":"거룩","t":"거룩 — 일반 개념과 의료인 적용","s":"","c":"영성·제자도","u":"2026-05-06","l":23,"p":null},{"n":"거버넌스","t":"거버넌스 (Governance)","s":"거버넌스(governance)는 '누가 결정권을 갖는가'라는 힘의 질문이 아니다. 그것은 참 주인이신 하나님의 뜻을 공동체가 함께 분별하는 청지기적 프로세스다.","c":"윤리·공공","u":"2026-06-27","l":29,"p":"https://wiki.youngdoctor.kr/marktl/%EA%B1%B0%EB%B2%84%EB%84%8C%EC%8A%A4/"},{"n":"고난","t":"고난","s":"고난은 인간이 경험하는 역경, 아픔, 시련을 총칭하되, 성경은 이를 단일한 범주로 다루지 않는다.","c":"조직신학·교리","u":"2026-07-10","l":76,"p":null},{"n":"공동체","t":"공동체","s":"공동체(共同體, Community)란 그리스도를 중심으로 생명을 나누는 지체들의 연합이다. 성경이 말하는 공동체의 원어는 코이노니아(κοινωνία, koinōnia) — 나눔, 참여, 함께함이다.","c":"목회·실천","u":"2026-07-10","l":88,"p":null},{"n":"공동체적영성훈련","t":"공동체적 영성 훈련 (Communal Spiritual Formation)","s":"공동체적 영성 훈련이란 영성 형성(spiritual formation)이 공동체 안에서, 공동체를 통해 이루어지도록 의도적으로 설계된 훈련의 구조다.","c":"영성·제자도","u":"2026-07-10","l":101,"p":null},{"n":"공의","t":"공의 (쯔다카 צְדָקָה · 미쉬파트 מִשְׁפָּט)","s":"공의는 성경이 두 개의 히브리어로 담아내는 하나님의 성품이자 하나님 백성의 삶의 방식이다.","c":"성경·해석","u":"2026-07-10","l":74,"p":null},{"n":"교회론","t":"교회론","s":"교회론(ecclesiology)은 교회의 본질과 표지, 직분과 구조, 그리고 사명을 묻는 신학의 분과다.","c":"조직신학·교리","u":"2026-07-10","l":141,"p":null},{"n":"교회사","t":"교회사","s":"교회사(Church History)는 오순절 이후 오늘까지 하나님의 백성 공동체가 걸어온 길을 신학적으로 성찰하는 학문이다.","c":"교회사","u":"2026-07-14","l":83,"p":null},{"n":"교회와사회참여","t":"교회와 사회 참여 — 어디까지, 어떻게","s":"교회와 사회 참여를 둘러싼 물음은 흔히 \"참여할 것인가 말 것인가\"로 제기되지만, 이 볼트의 자료들이 도달한 지점은 다르다.","c":"윤리·공공","u":"2026-07-10","l":77,"p":null},{"n":"구속적유사","t":"구속적 유사 (Redemptive Analogy)","s":"복음을 처음 듣는 문화권 사람들에게 복음은 대개 외래 종교로 들린다. 구속적 유사는 이 벽을 안쪽에서 허문다.","c":"선교","u":"2026-07-10","l":60,"p":null},{"n":"구약신학","t":"구약신학","s":"구약신학(Old Testament theology)은 히브리 성경을 구약 자체의 흐름과 범주로 읽어, 그 안에 담긴 하나님·인간·세계 이해를 서술하는 성경신학의 한 분과다.","c":"성경·해석","u":"2026-07-14","l":79,"p":null},{"n":"구원론","t":"구원론","s":"구원론(Soteriology)은 죄인이 어떻게 구원에 이르는가를 다루는 topics/조직신학의 분야다. 이 물음은 둘로 갈라진다.","c":"조직신학·교리","u":"2026-07-10","l":109,"p":null},{"n":"긍휼","t":"긍휼 (라하밈 רַחֲמִים · 스플랑크니조마이 σπλαγχνίζομαι)","s":"긍휼은 타인의 고통 앞에서 존재의 가장 깊은 곳이 움직이는 사랑이다. 성경은 이것을 관념의 언어가 아니라 신체의 언어로 말한다.","c":"성경·해석","u":"2026-07-10","l":102,"p":null},{"n":"기도","t":"기도","s":"기도는 하나님과의 인격적 대화다 — 간구, 감사, 찬양, 고백, 중보를 아우르며, 예수께서 주기도문(마 6:9-13)으로 그 본질을 직접 가르치셨다.","c":"영성·제자도","u":"2026-07-10","l":74,"p":null},{"n":"기독교교육","t":"기독교 교육","s":"기독교 교육은 지식을 머리에 넣는 일이 아니라, 하나님의 말씀을 알고 그대로 사는 인격을 빚는 일이다. 그 목표는 시험 점수가 아니라 \"무엇을 해도 선한 일을 하는 능력\"이며, 이상협은 이것이 \"성경을 알 때 가능하다\"고 말한다.","c":"목회·실천","u":"2026-07-17","l":24,"p":null},{"n":"기독교세계관","t":"기독교 세계관","s":"기독교 세계관(Christian Worldview)은 창조-타락-구속-완성(Creation-Fall-Redemption-Consummation)의 네 막 이야기로 현실 전체를 해석하는 통합적 인식 틀이다.","c":"변증·철학","u":"2026-07-10","l":105,"p":null},{"n":"기독교윤리학","t":"기독교윤리학","s":"기독교윤리학(Christian ethics)은 하나님의 계시된 뜻에 비추어 인간의 성품과 행동과 태도가 어떠해야 하는가를 다루는 신학의 한 분과다.","c":"윤리·공공","u":"2026-07-14","l":95,"p":null},{"n":"기독론","t":"기독론","s":"가이사랴 빌립보에서 예수는 제자들에게 물으셨다","c":"조직신학·교리","u":"2026-07-10","l":112,"p":null},{"n":"기독의료인정체성","t":"기독 의료인의 정체성","s":"기독 의료인의 정체성은 하나의 문장으로 요약된다 — \"예수님의 마음으로, 의료를 통해, 하나님 나라를 이루는 사람.\" 그러나 이 정의는 결론이지 출발점이 아니다.","c":"선교","u":"2026-07-10","l":158,"p":null},{"n":"기적","t":"기적","s":"","c":"영성·제자도","u":"2026-05-03","l":11,"p":null},{"n":"내면치유","t":"내면치유","s":"내면치유는 하나님 앞에서 자신의 내면세계 — 감정과 욕구, 상처와 갈등의 뿌리 — 를 정직하게 직면하고, 외면과 내면을 성경적 관점으로 건강하게 일치시켜 성령의 도우심으로 참 자아를 회복하는 과정이다.","c":"상담·가정","u":"2026-07-11","l":65,"p":null},{"n":"다신론","t":"다신론","s":"다신론(polytheism)은 복수의 신이 존재하며 각자 고유한 영역과 권능을 가진다는 세계관이다. 고대 그리스·로마 종교, 고대 근동의 만신전, 힌두교, 각종 애니미즘이 여기에 속한다.","c":"변증·철학","u":"2026-07-18","l":27,"p":null},{"n":"다중심적선교","t":"다중심적 선교 (Polycentric Mission)","s":"다중심적 선교란 선교의 중심이 단일한 곳(서구)에 있지 않고 여러 곳에 동시에 존재한다는 선교 패러다임이다.","c":"선교","u":"2026-06-27","l":73,"p":"https://wiki.youngdoctor.kr/marktl/%EB%8B%A4%EC%A4%91%EC%8B%AC%EC%A0%81%EC%84%A0%EA%B5%90/"},{"n":"단기선교","t":"단기선교","s":"단기선교(short-term mission)는 한 사람이 자기 문화권을 잠시 떠나, 수일에서 수주 동안 다른 지역·민족에게 복음과 섬김으로 다가갔다가 돌아오는 선교의 한 형태다.","c":"선교","u":"2026-07-17","l":31,"p":null},{"n":"단기선교실무","t":"단기선교 실무 가이드","s":"","c":"선교","u":"2026-05-11","l":6,"p":null},{"n":"대사명","t":"대사명","s":"대사명(大使命, the Great Commission)은 부활하신 예수께서 승천 직전 제자들에게 남기신 마지막 명령, 곧 \"모든 민족을 제자로 삼으라\"는 파송의 위임을 가리킨다.","c":"선교","u":"2026-07-14","l":43,"p":null},{"n":"대화","t":"대화","s":"대화(對話)의 사전적 뜻은 단순하다 — 마주 대하여 이야기를 주고받음. 그런데 people/문대원 목사는 이 평범한 정의에서 날카로운 칼날을 꺼낸다.","c":"상담·가정","u":"2026-07-14","l":58,"p":null},{"n":"두려움","t":"두려움","s":"성경에서 가장 자주 반복되는 명령이 \"두려워하지 말라\"라는 사실은 두려움에 관한 모든 신학의 출발점이다. 그 빈도가 말하는 바는 단순하다","c":"영성·제자도","u":"2026-07-14","l":41,"p":null},{"n":"디아스포라선교","t":"디아스포라 선교 (Diaspora Mission)","s":"디아스포라 선교는 흩어진 백성을 통한, 그리고 흩어진 백성을 향한 선교의 전략과 실천을 가리킨다.","c":"선교","u":"2026-07-17","l":18,"p":null},{"n":"리더십","t":"리더십","s":"리더십은 공동의 목표를 향해 타인에게 미치는 영향력이다. 조샘은 행동과학의 정의를 빌려 \"리더십은 직위가 아니라 영향력\"이라고 못박고, 권성수 목사는 존 맥스웰을 인용해 \"리더십에 모든 것의 성패가 달려 있다\"고 말한다.","c":"목회·실천","u":"2026-07-11","l":82,"p":null},{"n":"마음의건강","t":"마음의건강","s":"성경은 몸의 건강이 어디서 오는지를 뜻밖의 자리에 둔다. \"모든 지킬 만한 것 중에 더욱 네 마음을 지키라 생명의 근원이 이에서 남이니라\"(잠 4:23).","c":"상담·가정","u":"2026-07-17","l":35,"p":null},{"n":"메시야예언","t":"메시야예언","s":"","c":"성경·해석","u":"2026-07-14","l":4,"p":null},{"n":"멤버케어","t":"멤버케어 (Member Care)","s":"> \"영입부터 은퇴까지 — 적절한 시기에 따라 예방적·발달적·전인적 케어\"","c":"선교","u":"2026-05-07","l":20,"p":null},{"n":"목회상담","t":"목회상담","s":"목회상담(pastoral counseling)을 topics/기독교상담과 가르는 선은 기법이 아니라 자리와 관계다.","c":"상담·가정","u":"2026-07-14","l":41,"p":null},{"n":"목회학","t":"목회학","s":"","c":"목회·실천","u":"2026-04-17","l":13,"p":null},{"n":"무신론","t":"무신론","s":"무신론(atheism)은 어원 그대로 신 없음(a-theos), 곧 신의 존재를 부정하거나 신을 상정하지 않은 채 세계를 설명하려는 입장이다.","c":"변증·철학","u":"2026-07-14","l":80,"p":null},{"n":"미셔널처치와지역교회협력","t":"미셔널 처치와 지역교회-선교단체 협력","s":"","c":"선교","u":"2026-05-10","l":16,"p":null},{"n":"미씨오데이","t":"미씨오데이","s":"미씨오 데이(Missio Dei)는 라틴어로 \"하나님의 보내심\", 곧 \"하나님의 선교\"를 뜻하는 말이다. missio는 '보냄·파송'이고 Dei는 '하나님의'다","c":"선교","u":"2026-07-14","l":54,"p":null},{"n":"미전도종족","t":"미전도종족","s":"미전도종족(Unreached People Group, UPG)은 그 집단 안에 복음을 스스로 퍼뜨릴 만한 교회 공동체가 아직 없어서, 외부의 도움 없이는 복음이 자생적으로 확산되기 어려운 종족·언어·문화 집단을 가리킨다.","c":"선교","u":"2026-07-14","l":79,"p":null},{"n":"믿음","t":"믿음","s":"믿음(피스티스, πίστις)은 이 볼트에서 가장 많은 페이지가 기대어 서 있는 개념이다. 히브리서 11:1은 그것을 두 문장으로 정의한다","c":"조직신학·교리","u":"2026-07-11","l":87,"p":null},{"n":"바울신학","t":"바울신학","s":"바울신학(Pauline Theology)은 사도 people/바울의 열세 서신(혹은 일곱 친서)에 담긴 사상을 하나의 구조로 읽어내려는 시도다.","c":"성경·해석","u":"2026-07-14","l":111,"p":null},{"n":"바울의안경","t":"바울의 안경 — 경계를 넘는 신앙","s":"","c":"선교","u":"2026-05-10","l":8,"p":null},{"n":"번아웃과정체성","t":"번아웃과 정체성 (Burnout & Identity)","s":"","c":"영성·제자도","u":"2026-06-03","l":17,"p":null},{"n":"번영신학","t":"번영신학","s":"번영신학(prosperity theology, prosperity gospel)은 하나님을 믿으면 건강과 재정적 번영과 성공이 보장된다고 주장하는 신학적 입장이다.","c":"조직신학·교리","u":"2026-07-14","l":67,"p":null},{"n":"범신론","t":"범신론","s":"범신론(汎神論, Pantheism)은 그 이름에 이미 자기 전부를 담고 있다. 판(pan, 모든 것)과 테오스(theos, 신) — 모든 것이 곧 신이라는 것이다.","c":"변증·철학","u":"2026-07-17","l":42,"p":null},{"n":"변증학","t":"변증학","s":"변증학(apologetics)의 이름은 법정에서 피고가 스스로를 변론하던 헬라어 아폴로기아(ἀπολογία, 변론·해명)에서 왔다.","c":"변증·철학","u":"2026-07-14","l":86,"p":null},{"n":"복음서연구","t":"복음서연구","s":"복음서연구는 마태·마가·누가·요한의 네 복음서를 장르·역사·신학·해석의 층위에서 읽어, 그 안에 담긴 예수 이야기를 바르게 듣는 작업이다.","c":"성경·해석","u":"2026-07-17","l":51,"p":null},{"n":"복음주의","t":"복음주의","s":"복음주의(Evangelicalism)는 하나의 신학 체계가 아니라 하나의 정체성이자 운동이다. 이재훈 목사가 「세계 복음주의 흐름과 로잔 운동」에서 짚듯, '복음주의'라는 단어 자체는 역설을 품는다","c":"교회사","u":"2026-07-17","l":44,"p":null},{"n":"부모교육","t":"부모교육","s":"부모교육은 자녀를 고치는 기술이 아니라 부모를 세우는 일이다. 이 볼트에서 이 주제는 거의 전적으로 윤명숙 전도사님의 에젤 가정사역 부모교육 시리즈와, 같은 공동체의 청소년 부모학교 강의에서 길어 올려진다.","c":"목회·실천","u":"2026-07-14","l":29,"p":null},{"n":"부부친밀감","t":"부부 친밀감","s":"부부 친밀감은 두 사람이 서로의 약한 부분이 드러나도 부끄럽지 않은 자리에서 정서적·영적·신체적으로 하나 되어 가는 경험이다.","c":"상담·가정","u":"2026-07-17","l":24,"p":null},{"n":"부활","t":"부활","s":"부활(ἀνάστασις, anastasis)은 문자 그대로 \"다시 일어섬\"이며, 이 볼트의 자료들이 한결같이 붙드는 것은 그것이 영혼의 불멸이 아니라 죽었던 몸의 다시 일어섬이라는 점이다.","c":"조직신학·교리","u":"2026-07-11","l":94,"p":null},{"n":"비즈니스선교","t":"비즈니스선교 (BAM, Business as Mission)","s":"비즈니스선교란 비즈니스를 선교의 수단이 아니라 선교 그 자체로 보는 패러다임이다. 여기에는 전치사 하나의 전복이 들어 있다","c":"선교","u":"2026-07-14","l":68,"p":null},{"n":"사랑","t":"사랑","s":"사랑은 이 볼트에서 가장 많은 자료가 연결되는 주제다. 설교·강의·북노트를 가리지 않고 거의 모든 갈래가 어느 지점에선가 이 페이지를 통과한다.","c":"영성·제자도","u":"2026-07-11","l":93,"p":null},{"n":"산상수훈","t":"산상수훈 (마태복음 5–7장)","s":"","c":"영성·제자도","u":"2026-05-03","l":22,"p":null},{"n":"상황화","t":"상황화","s":"상황화(contextualization)는 변하지 않는 복음이 특정 문화 속에서 이해되고 뿌리내리도록 하는 과정이다.","c":"선교","u":"2026-07-14","l":92,"p":null},{"n":"새언약","t":"새언약","s":"새 언약(New Covenant)은 예레미야 31:31-34에 예언되고 예수 그리스도의 피로 체결된, 하나님과 그의 백성 사이의 결정적 언약이다.","c":"성경·해석","u":"2026-07-14","l":59,"p":null},{"n":"생명사역","t":"생명사역 (Life Ministry)","s":"생명사역은 동신교회가 75년의 정체성을 한 문장으로 압축한 사역 체계다.","c":"조직신학·교리","u":"2026-07-11","l":69,"p":null},{"n":"선교단체조직문화","t":"선교단체 조직 문화","s":"","c":"선교","u":"2026-05-11","l":9,"p":null},{"n":"선교사은퇴","t":"선교사 은퇴","s":"","c":"선교","u":"2026-05-08","l":11,"p":null},{"n":"선교신학","t":"선교신학","s":"하나님의 선교(Missio Dei)에 교회가 참여하는 방식과 신학적 근거를 탐구하는 학문. 성경적 선교의 본질, 방법론, 문화적 상황화를 다룬다.","c":"선교","u":"2026-06-07","l":48,"p":null},{"n":"선교적교회","t":"선교적 교회 (Missional Church)","s":"선교적 교회란 해외 선교를 지원하는 교회가 아니라, 교회의 존재 자체가 선교라고 고백하는 교회다. 여기에는 주어의 전복이 들어 있다","c":"선교","u":"2026-07-11","l":104,"p":null},{"n":"선교적교회_형성","t":"선교적 교회 형성","s":"선교적 교회 형성(missional / contextual church formation)은 교회가 어떻게 형성되는가(being formed)를 다룬다.","c":"선교","u":"2026-07-18","l":29,"p":null},{"n":"선교학","t":"선교학","s":"선교학(missiology)은 교회의 선교를 하나의 학문 분과로 연구하는 신학의 한 갈래다.","c":"선교","u":"2026-07-14","l":72,"p":null},{"n":"설교신학","t":"설교신학","s":"설교신학은 설교를 '어떻게 하는가'가 아니라 '왜 하는가'와 '무슨 일이 일어나는가'를 묻는 신학이다.","c":"목회·실천","u":"2026-07-17","l":32,"p":null},{"n":"설교적용","t":"설교적용","s":"","c":"목회·실천","u":"2026-04-17","l":9,"p":null},{"n":"설교전달","t":"설교전달 (Sermon Delivery)","s":"설교 전달은 준비된 설교를 청중에게 실제로 \"들려지게\" 하는 커뮤니케이션 과정이다. 폴 틸리히의 경고가 이 레인의 문제의식을 압축한다","c":"목회·실천","u":"2026-07-18","l":32,"p":null},{"n":"섬김","t":"섬김","s":"섬김은 타인의 필요를 채우기 위한 자발적 헌신이지만, 이 볼트의 자료들이 보여주는 섬김은 그 사전적 정의보다","c":"목회·실천","u":"2026-07-11","l":85,"p":null},{"n":"성경론","t":"성경론","s":"웨인 그루뎀의 조직신학이 성경 전체가 가르치는 교리를 일곱 범주로 묶을 때, 맨 앞에 놓이는 것이 성경론(Bibliology)이다.","c":"조직신학·교리","u":"2026-07-14","l":55,"p":null},{"n":"성경적인간이해","t":"성경적 인간 이해","s":"","c":"상담·가정","u":"2026-05-10","l":9,"p":null},{"n":"성경해석의역사","t":"성경해석의역사","s":"성경해석의 역사(History of Biblical Interpretation)는 초대교회부터 현재까지 교회가 성경을 어떻게 읽어 왔는지를 추적하는 학문이다.","c":"성경·해석","u":"2026-07-18","l":43,"p":null},{"n":"성경해석학","t":"성경해석학","s":"성경해석학(hermeneutics)은 성경 본문의 올바른 의미를 발견하는 방법 자체를 탐구하는 학문이다. 본문 하나를 푸는 일이 아니라, 본문을 푸는 절차가 왜 타당한지를 묻는 한 단계 위의 작업이다.","c":"성경·해석","u":"2026-07-14","l":88,"p":null},{"n":"성령론","t":"성령론","s":"성령론(pneumatology)은 \"성령이 누구시며 무엇을 하시는가\"를 종합하는 topics/성령 페이지와 갈라지는 지점에서 시작한다.","c":"조직신학·교리","u":"2026-07-14","l":50,"p":null},{"n":"성화","t":"성화 — 사람은 어떻게 변화되는가","s":"성화(聖化, sanctification)의 헬라어 하기아스모스(ἁγιασμός)는 \"구별됨·거룩하게 됨\"을 뜻한다.","c":"조직신학·교리","u":"2026-07-11","l":70,"p":null},{"n":"세계관","t":"세계관","s":"세계관(worldview)은 사람이 실재·진리·선(善)에 관해 붙들고 있는 근본 전제들의 총체, 곧 세상을 보고 해석하고 살아가는 방식을 규정하는 인식의 틀이다.","c":"변증·철학","u":"2026-07-14","l":37,"p":null},{"n":"센더의삶","t":"센더의 삶 (The Life of a Sender)","s":"","c":"선교","u":"2026-05-10","l":18,"p":null},{"n":"소명","t":"소명 (Calling / Vocation)","s":"\"하나님이 우리를 너무나 결정적으로 부르셨기에, 그분의 소환과 topics/은혜에 응답하여 우리의 모든 존재, 우리의 모든 행위, 우리의 모든 소유가 헌신적이고 역동적으로 그분을 섬기는 데 투자된다는 진리다.\" (오스 기니스, 『소명』 21p)","c":"영성·제자도","u":"2026-05-10","l":24,"p":null},{"n":"수치문화와복음","t":"수치 문화와 복음 (Shame Culture & the Gospel)","s":"","c":"선교","u":"2026-06-03","l":16,"p":null},{"n":"순교","t":"순교","s":"순교(殉敎, martyrdom)는 신앙을 지키기 위해 죽음을 받아들이는 것이지만, 그 말의 뿌리를 따라가면 죽음보다","c":"교회사","u":"2026-07-14","l":50,"p":null},{"n":"신론","t":"신론","s":"웨인 그루뎀의 조직신학은 성경 전체가 가르치는 교리를 일곱 범주로 묶는데, 성경론 다음에 곧바로 오는 것이 신론(Theology Proper)이다.","c":"조직신학·교리","u":"2026-07-14","l":42,"p":null},{"n":"신약신학","t":"신약신학","s":"신약신학(New Testament theology)은 신약 스물일곱 권을 신약 자체의 흐름과 범주로 읽어, 그 안에 담긴 하나님·그리스도·구원 이해를 서술하는 성경신학의 한 분과다.","c":"성경·해석","u":"2026-07-17","l":62,"p":null},{"n":"신존재증명","t":"신존재증명","s":"신 존재 증명(theistic arguments)은 성경의 권위에 호소하지 않고 이성과 경험만으로 하나님의 존재에 이르려는 논증들의 총칭이다.","c":"변증·철학","u":"2026-07-17","l":81,"p":null},{"n":"십자가","t":"십자가","s":"십자가(σταυρός, stauros)는 본래 로마 제국이 노예와 반역자를 가장 수치스럽게 처형하던 형틀의 이름이다.","c":"영성·제자도","u":"2026-07-11","l":108,"p":null},{"n":"영적완주","t":"영적 완주 (Finishing Strong)","s":"","c":"선교","u":"2026-05-10","l":14,"p":null},{"n":"영적은사","t":"영적은사","s":"영적 은사는 성령이 각 신자에게 나누어 주신 능력이다. 신약은 이를 카리스마타(χαρίσματα)라 부르는데, 이 말은 은혜를 뜻하는 카리스(χάρις)에서 파생한 것으로 — 은혜가 구체적 능력으로 개별화된 형태다.","c":"조직신학·교리","u":"2026-07-14","l":38,"p":null},{"n":"예배","t":"예배","s":"예배(worship)는 하나님께 합당한 가치(worth-ship)를 돌리는 모든 행위다. 헬라어 성경은 이를 두 계열의 단어로 담아낸다","c":"목회·실천","u":"2026-07-11","l":119,"p":null},{"n":"예배와선교","t":"예배와 선교","s":"예배와 선교는 흔히 경쟁 관계로 오해된다. 예배에 힘쓰면 선교가 약해지고, 선교에 매달리면 예배가 형식이 된다는 것이다.","c":"선교","u":"2026-07-18","l":23,"p":null},{"n":"용서","t":"용서","s":"용서는 이 볼트의 설교와 강의가 복음을 가장 자주 시험대에 올리는 자리다. 죄를 갚아야 할 빚으로 그린 마태복음 18장의 문법을 빌리면, 용서란 채권자가 손에 쥔 차용증을 놓아 버리는 행위다.","c":"조직신학·교리","u":"2026-07-11","l":68,"p":null},{"n":"우상숭배","t":"우상숭배","s":"성경이 우상숭배(עֲבוֹדָה זָרָה, 아보다 자라)를 다루는 방식에서 가장 먼저 무너지는 오해는, 그것이 나무와 돌로 깎은 형상의 문제라는 생각이다.","c":"조직신학·교리","u":"2026-07-11","l":81,"p":null},{"n":"유신론","t":"유신론 (Theism)","s":"","c":"변증·철학","u":"2026-05-07","l":9,"p":null},{"n":"은혜","t":"은혜 (카리스 χάρις · 헨 חֵן)","s":"비교종교학 학회에서 \"기독교에서만 발견되는 가장 독특한 교리가 무엇인가\"를 두고 논쟁이 벌어졌을 때, C.S.","c":"조직신학·교리","u":"2026-07-11","l":105,"p":null},{"n":"의료단기선교","t":"의료단기선교 어떻게?","s":"","c":"선교","u":"2026-05-08","l":12,"p":null},{"n":"의심","t":"의심","s":"","c":"영성·제자도","u":"2026-05-03","l":13,"p":null},{"n":"이단논쟁","t":"이단논쟁","s":"","c":"교회사","u":"2026-04-17","l":12,"p":null},{"n":"이미지설교","t":"이미지 설교 방법론","s":"","c":"목회·실천","u":"2026-05-11","l":17,"p":null},{"n":"이신론","t":"이신론","s":"이신론(理神論, Deism)은 하나님이 세계를 창조하셨다는 것은 인정하되, 창조 이후로는 그 세계에 관여하지 않으신다고 보는 신관이다.","c":"교회사","u":"2026-07-14","l":57,"p":null},{"n":"자녀양육","t":"자녀양육","s":"","c":"상담·가정","u":"2026-04-17","l":19,"p":null},{"n":"전도","t":"전도","s":"전도(Evangelism, εὐαγγελίζω)는 예수 그리스도의 죽음과 topics/부활로 이루어진 구원의 복음을 선포하고, 사람들이 topics/믿음으로 응답하도록 초청하는 사역이다.","c":"목회·실천","u":"2026-07-11","l":113,"p":null},{"n":"정교분리","t":"정교분리","s":"정교분리(separation of church and state)는 국가와 교회가 서로의 영역을 지배하지 않는다는 제도의 원리다.","c":"교회사","u":"2026-07-14","l":61,"p":null},{"n":"정체성","t":"정체성 (Identity)","s":"","c":"목회·실천","u":"2026-06-03","l":63,"p":"https://wiki.youngdoctor.kr/marktl/%EC%A0%95%EC%B2%B4%EC%84%B1/"},{"n":"제자훈련","t":"제자훈련 / 제자도","s":"예수 그리스도의 제자를 만들고 성장시키는 신학적·실천적 과정. 단순한 프로그램이 아닌 삶의 방식으로서의 제자도.","c":"목회·실천","u":"2026-04-16","l":64,"p":null},{"n":"조직신학","t":"조직신학","s":"조직신학(systematic theology)은 웨인 그루뎀의 한 문장으로 요약된다 — \"주어진 주제에 관해서 성경 전체가 오늘날 우리들에게 무엇을 가르치는가?\"라는 질문에 답하는 연구다.","c":"조직신학·교리","u":"2026-07-14","l":80,"p":null},{"n":"종교개혁","t":"종교개혁","s":"종교개혁(Reformation)은 1517년 마르틴 루터의 「95개 조항」에서 점화되어 16세기 서방 교회를 근본에서 다시 세운 신앙 운동이다.","c":"교회사","u":"2026-07-14","l":50,"p":null},{"n":"종말론","t":"종말론","s":"종말론(eschatology)은 에스카토스(ἔσχατος, \"마지막의\")에서 온 말로, 문자 그대로는 \"마지막 것들에 관한 가르침\"이다.","c":"조직신학·교리","u":"2026-07-11","l":65,"p":null},{"n":"죄론","t":"죄론","s":"죄론(hamartiology)은 죄가 무엇이며, 어디서 왔고, 인간을 어떻게 지배하는가를 다루는 조직신학의 분과다.","c":"조직신학·교리","u":"2026-07-17","l":34,"p":null},{"n":"직업신학","t":"직업신학","s":"직업신학은 '일이란 무엇인가'를 묻는다. 누가 나를 부르셨는가를 묻는 topics/소명론도, 일터라는 현장에서 어떻게 살 것인가를 묻는 topics/일터신학도 아니다.","c":"영성·제자도","u":"2026-07-14","l":51,"p":null},{"n":"창조세계돌봄","t":"창조세계 돌봄 — 선교의 통합적 지평","s":"","c":"선교","u":"2026-06-07","l":12,"p":null},{"n":"창조신학","t":"창조신학","s":"창조신학(theology of creation)은 \"태초에 하나님이 천지를 창조하시니라\"는 한 문장이 무엇을 뜻하는지를 묻는다.","c":"조직신학·교리","u":"2026-07-14","l":103,"p":null},{"n":"총체적선교","t":"총체적 선교 (Holistic/Integral Mission)","s":"","c":"선교","u":"2026-06-07","l":19,"p":null},{"n":"침례교신학","t":"침례교신학","s":"","c":"교회사","u":"2026-04-17","l":13,"p":null},{"n":"침례교회","t":"침례교회","s":"침례교회(Baptist Church)는 17세기 초 영국 분리주의의 흐름에서 태어난, 자유교회(free church)·신자의 교회(believers' church) 전통의 가장 큰 갈래다.","c":"교회사","u":"2026-07-17","l":54,"p":null},{"n":"칼빈주의","t":"칼빈주의","s":"칼빈주의(Calvinism)는 장 칼뱅(people/칼빈)의 신학에서 발원하여 도르트 총회(1618~19)에서 하나의 구원론 체계로 결정화된 개혁주의 전통이다.","c":"조직신학·교리","u":"2026-07-14","l":56,"p":null},{"n":"탈교회_디처치드","t":"탈교회 / 디처치드 (Dechurched)","s":"","c":"선교","u":"2026-05-02","l":9,"p":null},{"n":"토라","t":"토라","s":"토라(תּוֹרָה)는 창세기부터 신명기까지 다섯 권, 곧 모세오경을 가리키는 히브리어다. 그러나 이 단어의 첫 번째 무게는 책의 목록이 아니라 그 뜻에 있다.","c":"성경·해석","u":"2026-07-14","l":55,"p":null},{"n":"평신도신학","t":"평신도신학","s":"","c":"목회·실천","u":"2026-04-17","l":11,"p":null},{"n":"현대인의리추얼","t":"현대인의 리추얼 (Ritual) — 예배의 재발견","s":"","c":"목회·실천","u":"2026-05-02","l":5,"p":null},{"n":"회개","t":"회개","s":"회개는 이 볼트에서 죄에 대한 감정적 후회가 아니라 방향의 돌이킴으로 정의된다. 두 원어가 이 사실을 붙든다.","c":"조직신학·교리","u":"2026-07-11","l":64,"p":null},{"n":"가나안정복","t":"가나안 정복","s":"가나안 정복은 여호수아·사사기에 기록된, 이스라엘이 약속의 땅 가나안에 들어가 그 원주민을 몰아내거나 진멸(헤렘)한 사건군을 가리킨다.","c":"성경·해석","u":"2026-07-02","l":24,"p":null},{"n":"가정","t":"가정","s":"가정(家庭)이라는 말에는 집 가(家)와 뜰 정(庭)이 함께 들어 있다. 사람이 아니라 장소를 가리키는 두 글자다.","c":"목회·실천","u":"2026-07-14","l":65,"p":null},{"n":"감리교","t":"감리교","s":"감리교(Methodism)는 존 웨슬리에게서 비롯된 복음주의 전통으로, 규칙적 경건(method)·성결·사회적 성화를 강조한다.","c":"교회사","u":"2026-07-04","l":2,"p":null},{"n":"감사","t":"감사","s":"이 볼트에서 감사는 형편이 좋아진 데 대한 정서적 반응이 아니라, 이미 받은 은혜를 인식하는 자리에서 솟아나는 응답이자 훈련되는 성품으로 일관되게 다뤄진다.","c":"목회·실천","u":"2026-07-14","l":92,"p":null},{"n":"감정","t":"감정","s":"감정에 대한 뿌리 깊은 오해가 하나 있다. 감정은 이성의 방해물이거나, 심하게는 타락의 산물이라는 생각이다.","c":"윤리·공공","u":"2026-07-17","l":35,"p":null},{"n":"개혁주의인식론","t":"개혁주의 인식론 (Reformed Epistemology)","s":"개혁주의 인식론은 하나님에 대한 믿음이 다른 증거에 근거하지 않고도 합리적일 수 있다고 보는 인식론적 변증 입장이다.","c":"변증·철학","u":"2026-06-28","l":11,"p":null},{"n":"견유학파","t":"견유학파 (Cynics)","s":"견유학파(犬儒學派, Cynicism)는 고대 그리스에서 기원한 철학 학파로, 디오게네스(주전 412-323년경)가 대표적 인물이다.","c":"성경·해석","u":"2026-06-28","l":12,"p":null},{"n":"결과주의","t":"결과주의","s":"결과주의(consequentialism)는 행위의 도덕적 가치를 그 결과(산출된 선)로 판단하는 입장으로, 목적론적 전통의 핵심 형태다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"결혼","t":"결혼","s":"결혼은 한 남자와 한 여자가 하나님 앞에서 언약을 맺고 한 몸을 이루는, 하나님이 친히 세우신 제도다. 이 한 문장 안에 이 페이지가 맡는 몫이 다","c":"상담·가정","u":"2026-07-14","l":37,"p":null},{"n":"결혼과가정","t":"결혼과가정","s":"가정은 하나님이 세상 안에 세우신 첫 공동체이자, 창조 질서의 기초 단위다. 하나님은 남자와 여자를 지으시고 부모를 떠나 한 몸을 이루게 하심으로(창 2:24) 결혼을 세우셨고, 그 결혼을 씨앗으로 자녀와 확대가족과 세대가 자라나는 가정을 세우셨다.","c":"상담·가정","u":"2026-07-14","l":59,"p":null},{"n":"겸손","t":"겸손","s":"겸손을 뜻하는 신약의 말 타페이노프로쉬네(ταπεινοφροσύνη, tapeinophrosynē)는 '낮은'(ταπεινός, tapeinos)과 '마음·생각'이 붙어 만들어진 낱말, 곧 '낮은 마음'이다.","c":"영성·제자도","u":"2026-07-14","l":41,"p":null},{"n":"경건생활","t":"경건생활","s":"경건(敬虔)이라는 말은 신약에서 유세베이아(εὐσέβεια)로 나타난다. 흔히 종교적 경외심으로 옮겨지지만, 바울이 디모데에게 이 단어를 쓸 때 그것은 정적인 마음가짐이 아니라 훈련의 대상이었다.","c":"영성·제자도","u":"2026-07-17","l":39,"p":null},{"n":"경건주의","t":"경건주의 (Pietism)","s":"경건주의(Pietism)는 17세기 후반 독일 루터교 안에서 교리의 정통성만으로는 채워지지 않는 신앙의 체험적·실천적 차원을 회복하고자 일어난 갱신 운동이다.","c":"교회사","u":"2026-07-10","l":37,"p":null},{"n":"계시","t":"계시","s":"계시(revelation)라는 말의 뿌리에는 \"덮개를 벗긴다\"는 그림이 있다. 그리스어 아포칼립시스(ἀποκάλυψις)는 가려져 있던 것을 걷어내어 드러냄을 뜻한다.","c":"조직신학·교리","u":"2026-07-17","l":40,"p":null},{"n":"고난과회복","t":"고난과회복","s":"고난과회복은 이 볼트가 성경을 읽는 가장 근본적인 리듬 가운데 하나다. 죄가 세상에 들어온 이래 인간의 실존은 역경과 아픔을 통과하지만, 성경은 그 고난을 마지막 말로 두지 않는다.","c":"목회·실천","u":"2026-07-14","l":54,"p":null},{"n":"고난받는종","t":"고난받는 종","s":"이사야서에는 메시아적 종·구원자·왕적 자손의 이미지가 흐르다가, 사 52:13-53:12에 이르러 갑자기 찔리고 상하며 채찍에 맞는 종의 모습이 등장한다.","c":"성경·해석","u":"2026-07-10","l":49,"p":null},{"n":"공감","t":"공감","s":"공감(empathy)은 상대방의 감정·경험·관점을 그 사람의 입장에서 이해하고, 그 이해를 상대방이 느낄 수 있도록 전달하는 능력이다.","c":"상담·가정","u":"2026-07-12","l":70,"p":null},{"n":"공관복음문제","t":"공관복음 문제 (Synoptic Problem)","s":"공관복음 문제(Synoptic Problem)란 마태·마가·누가복음이 서로 어떤 문학적 관계에 있는가를 해명하려는 신약학의 핵심 논쟁이다.","c":"성경·해석","u":"2026-06-28","l":20,"p":null},{"n":"공동선","t":"공동선 (Common Good)","s":"공동선은 \"모두에게 좋은 것\"이라는 상식적 정의를 넘어서는 개념이다. 공익(public good)이 '너와 우리'라는 수평적 2자 관계에서 다수의 이익을 극대화하려 한다면, 공동선은 거기에 하나님이라는 수직 차원을 더한 3자 관계 속에서 선을 묻는다.","c":"윤리·공공","u":"2026-06-27","l":68,"p":"https://wiki.youngdoctor.kr/marktl/%EA%B3%B5%EB%8F%99%EC%84%A0/"},{"n":"공리주의","t":"공리주의","s":"공리주의(utilitarianism)는 \"최대다수의 최대행복\"(the greatest happiness of the greatest number)을 도덕 판단의 기준으로 삼는 결과주의 윤리다.","c":"윤리·공공","u":"2026-07-10","l":80,"p":null},{"n":"공의회","t":"공의회","s":"공의회(Council)는 교회의 신앙과 질서에 관한 문제를 감독(주교)들과 지도자들이 함께 모여 분별하고 결정하는 회의다.","c":"교회사","u":"2026-07-10","l":70,"p":null},{"n":"관계회복","t":"관계회복","s":"관계회복은 이 볼트의 설교·강의·책들이 복음을 읽는 가장 일관된 문법 가운데 하나다.","c":"조직신학·교리","u":"2026-07-10","l":100,"p":null},{"n":"관념론","t":"관념론 (Idealism)","s":"관념론은 lectures/MBTS/기독교윤리학/07주_의무론적전통에서 세속 의무론 계보의 한 갈래로 다뤄진다.","c":"윤리·공공","u":"2026-07-03","l":16,"p":null},{"n":"광야","t":"광야","s":"광야(מִדְבָּר midbar)는 이 볼트에서 단순한 지리적 황무지가 아니라 훈련과 형성의 장소, 곧 보장이 사라진 자리에서 신앙의 근거가 시험받고 다시 세워지는 무대로 일관되게 다루어진다.","c":"영성·제자도","u":"2026-06-28","l":16,"p":null},{"n":"교리","t":"교리","s":"","c":"윤리·공공","u":"2026-07-03","l":8,"p":null},{"n":"교황권","t":"교황권","s":"교황권(papacy)은 로마 감독(교황)의 수위권과 그 정치·종교적 권력이다. 중세에 절정(인노첸시오 3세)에 이른 뒤 국가주의 대두로 쇠퇴했다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"교황무오설","t":"교황무오설","s":"교황무오설(papal infallibility)은 교황이 '엑스 카테드라'로 신앙·도덕을 선언할 때 오류가 없다는 교리로, 1870년 제1차 바티칸 공의회에서 정의되었다.","c":"교회사","u":"2026-07-04","l":2,"p":null},{"n":"교회개척","t":"교회개척","s":"교회개척은 건물을 세우는 일이 아니다. 이용범 선교사는 알바니아 현장에서 이 점을 단호하게 선언한다: \"건물을 세우는 것이 교회 개척은 아니다.","c":"목회·실천","u":"2026-07-10","l":33,"p":null},{"n":"교회대분열","t":"교회대분열","s":"서방 교회 대분열(1378-1417). 로마와 아비뇽에 동시에 교황이 서서 교황권 위기를 드러냈고, 콘스탄츠 공의회로 수습되었다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"교회연합","t":"교회연합","s":"교회연합은 서로 다른 교단·전통·배경을 가진 교회와 그리스도인들이, 그리스도 안에서 이미 주어진 하나됨을 힘써 지키고 세상 앞에 드러내며, 공동의 사명을 위해 협력하는 것이다.","c":"조직신학·교리","u":"2026-07-10","l":97,"p":null},{"n":"교회행정","t":"교회 행정 (Church Administration)","s":"","c":"목회·실천","u":"2026-07-04","l":4,"p":null},{"n":"구속신학","t":"구속신학","s":"구속(救贖, Redemption)은 죄와 압제 아래 사로잡힌 것을 값을 치르고 되사서 자유케 하고, 그렇게 창조의 선한 상태를 회복시키시는 하나님의 사역이다.","c":"성경·해석","u":"2026-07-10","l":99,"p":null},{"n":"구약윤리","t":"구약윤리","s":"구약윤리란 고대 이스라엘에게 주어진 구약성경의 도덕적 가르침을, 시대와 정황이 전혀 다른 오늘의 독자가 어떻게 받아들이고 적용할 것인가를 다루는 신학적 탐구 분야다.","c":"성경·해석","u":"2026-07-10","l":99,"p":null},{"n":"구원","t":"구원","s":"구원(salvation)은 기독교의 가장 익숙한 단어이면서, 바로 그 익숙함 때문에 가장 자주 좁아지는 단어다.","c":"조직신학·교리","u":"2026-07-14","l":85,"p":null},{"n":"구제","t":"구제 (엘레에모쉬네 ἐλεημοσύνη · 메타디도미 μεταδίδωμι)","s":"구제는 가난한 자의 필요를 물질로 채우는 실천이다. 그러나 이 볼트의 자료들은 그 정의에서 멈추지 않는다.","c":"조직신학·교리","u":"2026-07-10","l":92,"p":null},{"n":"권력","t":"권력","s":"권력(權力, power)은 topics/영향력의 동력이다. 매클러랜드의 동기 이론에서 권력 동기(nPow)는 조직 리더십에서 가장 효과적인 동기로 꼽힌다(people/맥클러랜드).","c":"목회·실천","u":"2026-07-10","l":83,"p":null},{"n":"권징","t":"권징","s":"권징은 교회가 성도의 순결과 거룩을 지키기 위해 시행하는 치리 행위로, topics/은혜의수단 가운데 하나로 이해된다.","c":"조직신학·교리","u":"2026-07-03","l":11,"p":null},{"n":"기독교상담","t":"기독교상담","s":"기독교상담은 성경적 인간 이해 위에서 심리학의 통찰을 분별력 있게 통합하여 내담자의 전인적 치유와 성장을 돕는 실천 분야다.","c":"상담·가정","u":"2026-07-10","l":78,"p":null},{"n":"기독교지역사회개발","t":"기독교 지역사회 개발 (Christian Community Development)","s":"기독교 지역사회 개발(Christian Community Development)은 가난한 지역 공동체 안으로 들어가 우물·보건·교육·경제 같은 삶의 조건을 주민과 함께 일으켜 세우되, 그 회복의 종착지를 창조 때의 온전함에 두는 선교 실천이다.","c":"선교","u":"2026-07-11","l":91,"p":null},{"n":"기복신앙","t":"기복신앙","s":"기복신앙(祈福信仰)은 신앙의 동기와 목적이 복(福)의 획득에 있는 신앙 형태를 가리킨다.","c":"영성·제자도","u":"2026-06-28","l":15,"p":null},{"n":"기쁨","t":"기쁨","s":"신약이 기쁨이라 부르는 카라(χαρά)는 이 볼트에서 가장 역설적인 자리마다 명령되는 단어다.","c":"영성·제자도","u":"2026-07-10","l":95,"p":null},{"n":"깨어있음","t":"깨어있음","s":"\"깨어 있으라.\" 신약이 종말 사이의 시간을 사는 제자에게 가장 자주 반복하는 명령 가운데 하나다. 헬라어 그레고레오(γρηγορέω)는 잠에서 깨어나 경계 태세를 유지하는 것, 곧 보초의 단어다.","c":"조직신학·교리","u":"2026-07-10","l":69,"p":null},{"n":"내러티브신학","t":"내러티브 신학","s":"내러티브 신학(Narrative Theology)은 성경을 단편적 교리 명제들의 집합이 아니라 하나의 통일된 이야기(메타내러티브)로 읽는 해석 접근이다.","c":"성경·해석","u":"2026-06-28","l":23,"p":null},{"n":"내러티브윤리학","t":"내러티브윤리학","s":"내러티브윤리학(narrative ethics)은 윤리적 판결의 배경이 되는 역사·이야기에 초점을 맞추는 윤리학 접근이다.","c":"윤리·공공","u":"2026-07-03","l":22,"p":null},{"n":"내재성","t":"내재성","s":"내재성(immanence)은 하나님이 만물 안에, 만물에 개입하여 계신다는 성경적 진리다.","c":"조직신학·교리","u":"2026-07-03","l":15,"p":null},{"n":"내재적성경해석","t":"내재적 성경해석","s":"내재적 성경해석은 본문에 하나님의 이름이나 종교적 어휘가 명시적으로 등장하지 않아도, 언어적 단서와 다른 본문과의 상호텍스트적 병행을 통해 그 배후에서 일하시는 하나님을 읽어내는 해석 방법이다.","c":"성경·해석","u":"2026-06-28","l":20,"p":null},{"n":"논리실증주의","t":"논리실증주의","s":"논리실증주의는 기독교윤리학 5주차 강의(6장 실존적 전통)가 세속 윤리학사의 \"언어철학적 전환\" 단계로 다루는 사조다.","c":"윤리·공공","u":"2026-07-03","l":16,"p":null},{"n":"니케아공의회","t":"니케아공의회","s":"325년 콘스탄틴이 소집한 첫 에큐메니칼 공의회. 아리우스주의를 정죄하고 성자의 동일본질을 고백한 니케아 신조를 채택했다.","c":"교회사","u":"2026-07-10","l":4,"p":null},{"n":"다원주의","t":"다원주의","s":"다원주의는 옳고 그름에 대한 판단이 개인·집단마다 다를 수 있다는 전제 위에서 하나의 절대적 진리 주장을 상대화하는 사회적 조건이다.","c":"선교","u":"2026-07-02","l":16,"p":null},{"n":"다음세대","t":"다음세대","s":"다음세대는 신앙을 이어받아야 할 자녀·청년·학생 세대를 가리키며, 동시에 그 세대가 교회에서 빠져나가고 있다는 위기의식과 교회의 사역적 응답을 함께 묶는 주제다.","c":"목회·실천","u":"2026-07-17","l":40,"p":null},{"n":"대위임령","t":"대위임령","s":"대위임령(大委任令, Great Commission)은 마태복음 28:18-20에서 부활하신 예수님이 제자들에게 주신 \"모든 민족을 제자로 삼으라\"는 명령이다.","c":"선교","u":"2026-07-18","l":27,"p":null},{"n":"덕윤리","t":"덕윤리","s":"덕윤리(virtue ethics)는 행위 규칙이 아니라 행위자의 성품(덕)에 초점을 두는 전통으로, 아리스토텔레스에 뿌리를 둔다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"도나투스파논쟁","t":"도나투스파논쟁","s":"도나투스 논쟁은 배교자가 집전한 성례의 효력을 둘러싼 4-5세기 북아프리카의 분열이다. 어거스틴이 성례의 객관적 효력을 옹호했다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"도덕","t":"도덕","s":"도덕(morality)은 옳고 그름·선악에 관한 규범과 그 실천이다. 기독교 윤리는 도덕의 근거를 하나님의 성품과 계시에 둔다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"도시선교","t":"도시 선교","s":"도시 선교는 도시를 선교의 전략적 거점으로 보는 패러다임이다. 그러나 이것은 단순히 '도시에서 전도하자'는 지역 전략이 아니다.","c":"선교","u":"2026-06-28","l":35,"p":"https://wiki.youngdoctor.kr/marktl/%EB%8F%84%EC%8B%9C%EC%84%A0%EA%B5%90/"},{"n":"동서교회대분열","t":"동서교회대분열","s":"1054년 로마(서방)와 콘스탄티노플(동방) 교회의 상호 파문으로 굳어진 분열. 필리오케·교황 수위권 등이 쟁점이었다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"디아스포라","t":"디아스포라","s":"디아스포라(διασπορά)는 \"흩어짐\"을 뜻하는 헬라어다. 씨를 뿌리듯 사방으로 던진다는 동사 디아스페이로(διασπείρω)에서 왔다.","c":"선교","u":"2026-07-17","l":61,"p":null},{"n":"말씀","t":"말씀","s":"이 볼트에서 '말씀'은 읽고 동의하는 정보가 아니라, 그 자체에 능력을 품고 사람을 살리고 가르는 살아 있는 실체로 다루어진다.","c":"성경·해석","u":"2026-07-17","l":27,"p":null},{"n":"말씀묵상","t":"말씀묵상","s":"말씀묵상은 하나님의 기록된 말씀을 되씹어, 그것이 내 삶에 선포된 말씀이 되게 하는 실천이다. 이 정의에서 가장 오해받는 단어는 \"되씹다\"이다.","c":"성경·해석","u":"2026-07-14","l":76,"p":null},{"n":"말씀선포","t":"말씀 선포","s":"말씀 선포는 전통적으로 topics/은혜의수단의 첫 번째 자리를 차지해 온 요소다. 그리스도인이 된 이후에도 영의 양식으로서 성도를 든든히 세우고, 죄를 깨닫게 하며 의를 향하게 하는 지속적인 통로로 이해된다.","c":"조직신학·교리","u":"2026-07-03","l":12,"p":null},{"n":"메시아예언","t":"메시아 예언","s":"메시아 예언은 구약 본문이 장차 오실 구원자(그리스도)를 가리키는 것으로 읽히는 예언을 뜻한다.","c":"성경·해석","u":"2026-07-03","l":26,"p":null},{"n":"메타윤리학","t":"메타윤리학","s":"메타윤리학(metaethics)은 도덕 판단의 의미·근거·지위를 다루는 이차적 탐구다(예: 도덕 실재론 대 정서주의).","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"면죄부","t":"면죄부","s":"면죄부(indulgence)는 죄의 잠벌을 면해준다는 증서로, 중세 말 남용되어 후대 종교개혁의 직접적 도화선이 되었다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"명령윤리학","t":"명령윤리학","s":"명령윤리학은 도덕의 근거를 하나님의 명령에 두는 입장(divine command theory)이다. 하나님의 뜻이 곧 도덕의 궁극 기준이라는 신본주의 윤리의 형태다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"목적론","t":"목적론 (Teleology)","s":"목적론(teleology)은 \"목표\" 또는 \"목적\"을 뜻하는 헬라어 텔로스(telos)에서 온 말로, 윤리를 \"목적과 그 목적을 달성하는 수단을 선택하는 행위\"로 이해하는 전통이다.","c":"윤리·공공","u":"2026-07-03","l":42,"p":null},{"n":"목회돌봄","t":"목회 돌봄 (Pastoral Care)","s":"","c":"상담·가정","u":"2026-07-04","l":5,"p":null},{"n":"몰리니즘","t":"몰리니즘","s":"몰리니즘(Molinism)은 16세기 예수회 신학자 루이스 데 몰리나(Luis de Molina)가 제안한 신학적 입장으로, 하나님이 topics/중간지식(middle knowledge) — 조건적 미래 사건(\"만일 어떤 자유로운 행위자가 특정 상황에 놓인다면 무엇을 선택할 것인가\")에 대한 지식 — 을 가지고 계신다는 전제로 신적 주권과 인간의 자유의지를 조화시키려 한다.","c":"변증·철학","u":"2026-07-03","l":24,"p":null},{"n":"무로부터의창조","t":"무로부터의 창조 (creatio ex nihilo)","s":"하나님이 이미 존재하는 재료 없이 아무것도 없는 데서(ex nihilo) 우주를 지으셨다는 교리.","c":"조직신학·교리","u":"2026-07-03","l":13,"p":null},{"n":"무슬림선교","t":"무슬림 선교","s":"무슬림 선교는 이슬람 신앙을 가진 사람들과 이슬람 문화권 사회를 향한 복음 사역을 가리킨다.","c":"선교","u":"2026-06-28","l":23,"p":null},{"n":"문서가설","t":"문서가설","s":"오경(모세오경)이 단일 저자(모세)의 저작이 아니라 여러 시대·저자의 문서들이 편집되어 형성되었다고 보는 성서비평학적 가설이다.","c":"성경·해석","u":"2026-07-02","l":12,"p":null},{"n":"문서선지자","t":"문서선지자","s":"문서선지자는 자신의 이름으로 된 기록을 남긴 topics/선지서 저자군을 가리키는 범주다. MBTS 구약개론II 4주차 강의(\"선지서란?\")는 이 범주를 구체적인 시간 폭으로 못박는다","c":"성경·해석","u":"2026-07-03","l":20,"p":null},{"n":"문학비평","t":"문학비평 (Literary Criticism)","s":"문학비평은 성경 본문을 독립된 문학 작품으로 분석하는 해석 접근이다.","c":"성경·해석","u":"2026-06-28","l":14,"p":null},{"n":"미세조정","t":"미세조정 (Fine-Tuning)","s":"미세조정 논증(fine-tuning argument)은 우주를 지배하는 물리 상수들의 값이 생명체가 존재할 수 있는 극히 좁은 범위 안에 정확히 맞춰져 있다는 관측적 사실에서 출발해, 이 정교한 조율이 우연이 아니라 지적 설계를 가리킨다고 보는 신 존재 논증이다.","c":"변증·철학","u":"2026-07-03","l":16,"p":null},{"n":"바티칸2차공의회","t":"바티칸2차공의회","s":"제2차 바티칸 공의회(1962-1965)는 로마 가톨릭의 현대적 갱신(전례 개혁·에큐메니즘·현대 세계와의 대화)을 이끈 공의회다.","c":"교회사","u":"2026-07-04","l":2,"p":null},{"n":"박해","t":"박해","s":"박해(迫害, persecution)는 신앙을 이유로 개인이나 공동체에 가해지는 폭력·억압·법적 제재를 아우르는 넓은 스펙트럼이다.","c":"교회사","u":"2026-07-18","l":37,"p":null},{"n":"범재신론","t":"범재신론 (Panentheism)","s":"하나님이 세계 안에 있고 세계와 동일시된다고 보는 신관. MBTS 변증학 2주차 강의가 제시하는 신관 7분류(무신론·다신론·범재신론·제한신론·범신론·자연신론·유일신론) 중 하나로, 범신론과 이신론의 전제를 조화시키려는 견해로 소개된다.","c":"변증·철학","u":"2026-07-03","l":7,"p":null},{"n":"변신론","t":"변신론","s":"변신론(辯神論, theodicy)은 악의 실재 앞에서 하나님의 선하심과 전능하심을 이성적으로 변호하려는 신학적·철학적 기획이다.","c":"변증·철학","u":"2026-07-17","l":52,"p":null},{"n":"보수주의","t":"보수주의","s":"(신학적) 보수주의는 성경의 무오·권위와 정통 교리를 견지하는 입장으로, 기독교 윤리의 규범적 토대를 성경에 둔다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"보존","t":"보존","s":"조직신학I 5주차 토론(\"창조와 섭리의 관계\")은 보존(preservation)을 하나님의 섭리를 이루는 세 요소 가운데 첫 번째로 다룬다.","c":"조직신학·교리","u":"2026-07-03","l":13,"p":null},{"n":"복음","t":"복음","s":"복음(εὐαγγέλιον, euangelion)은 문자 그대로 \"좋은 소식\"이며, 이 볼트가 그 단어에서 가장 먼저 끄집어내는 것은 소식의 문법이다.","c":"조직신학·교리","u":"2026-07-14","l":63,"p":null},{"n":"부르심","t":"부르심","s":"부르심(calling)은 하나님이 사람을 자기 자신에게로, 그리고 자기의 목적으로 이끄시는 주도적 행위다. 이 단어의 문법에서 주어는 언제나 하나님이다.","c":"조직신학·교리","u":"2026-07-14","l":40,"p":null},{"n":"부부관계","t":"부부관계","s":"부부관계는 한 남자와 한 여자가 언약으로 묶여 한 몸을 이루는 두 사람 사이의 관계 역학이다.","c":"상담·가정","u":"2026-07-14","l":43,"p":null},{"n":"부부상담","t":"부부 상담 (Marital Counseling)","s":"","c":"상담·가정","u":"2026-07-04","l":4,"p":null},{"n":"부흥","t":"부흥","s":"부흥(revival)의 정체는 그 단어의 어원에 이미 새겨져 있다. people/권성수 목사가 행전 부흥 강해에서 되풀이하듯, revival은 re(다시)와 vive(살다)의 합성이며 \"다시 사는 것이 부흥이다","c":"영성·제자도","u":"2026-07-14","l":50,"p":null},{"n":"북한선교","t":"북한선교","s":"북한선교는 복음이 차단된 북한 체제 안팎의 주민들에게 그리스도의 복음을 전하고 교회를 세우는 사역을 총칭한다.","c":"선교","u":"2026-06-28","l":8,"p":null},{"n":"빅뱅우주론","t":"빅뱅우주론","s":"빅뱅우주론은 우주가 유한한 과거의 한 시점에 시작되었다는 현대 물리학의 표준 우주론이다. MBTS 변증학 8주차 강의는 이를 철학적 논증(칼람 우주론적 논증)이 아니라 과학적 확증으로서 \"우주에 시작점이 있다\"는 명제를 뒷받침하는 결정적 자료로 다룬다.","c":"변증·철학","u":"2026-07-03","l":15,"p":null},{"n":"사명","t":"사명","s":"사명(使命)은 하나님이 한 사람에게 맡기신 과업이다. 이 볼트에서 사명을 이해하는 열쇠는 사도행전 9장 15절의 한 단어에 있다","c":"영성·제자도","u":"2026-07-17","l":43,"p":null},{"n":"사사기사이클","t":"사사기 사이클","s":"사사기 사이클은 사사기 전체를 관통하는 \"우상숭배 → 징계 → 부르짖음 → 사사 → 평화 → (다시) 우상숭배\"의 순환 구조를 가리킨다.","c":"성경·해석","u":"2026-06-28","l":8,"p":null},{"n":"사춘기","t":"사춘기","s":"사춘기(思春期, adolescence)는 아동에서 성인으로 이행하는 과도기적 발달 단계로, 신체적 성숙(호르몬 변화, 제2차 성징)과 함께 인지·정서·사회적 변화가 급격히 일어나는 시기다.","c":"목회·실천","u":"2026-06-28","l":13,"p":null},{"n":"사회적책임","t":"사회적 책임","s":"복음을 전하는 일과 세상을 섬기는 일 — 이 둘은 어떤 관계에 놓이는가. 20세기 복음주의가 반세기 넘게 씨름한 이 물음이 이 페이지의 주제다.","c":"선교","u":"2026-07-18","l":32,"p":null},{"n":"사회정의","t":"사회정의","s":"사회정의는 두 개의 세계가 같은 이름으로 만나는 자리다. 한쪽에는 구약 선지서가 삼천 년 전부터 외쳐 온 요구가 있다","c":"성경·해석","u":"2026-07-17","l":41,"p":null},{"n":"삼위일체","t":"삼위일체","s":"삼위일체(Trinity)는 기독교 신앙의 핵심 교리다. 한 본질(ousia) 안에 세 위격(hypostasis) — 성부·성자·성령이 각각 완전한 하나님이시며, 동시에 세 위격이 하나의 하나님이시다.","c":"조직신학·교리","u":"2026-06-23","l":23,"p":null},{"n":"삼중관점","t":"삼중관점","s":"삼중관점(triperspectivalism)은 코넬리우스 반틸이 처음 제안하고 존 프레임이 발전시킨 방법론으로, 윤리적 판단을 규범적(normative)·상황적(situational)·실존적(existential) 세 관점의 상호의존으로 파악한다.","c":"윤리·공공","u":"2026-07-03","l":47,"p":null},{"n":"상담자의두명령","t":"상담자의 두 명령","s":"","c":"상담·가정","u":"2026-06-10","l":1,"p":null},{"n":"상대주의","t":"상대주의","s":"윤리적 상대주의(relativism)는 도덕 기준이 문화·개인에 따라 상대적이며 보편 규범이 없다고 보는 입장이다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"상황윤리","t":"상황윤리","s":"상황윤리(situation ethics)는 고정된 규범 대신 구체적 상황에서 사랑(agape)을 유일한 규범으로 삼는 입장이다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"생명윤리","t":"생명윤리","s":"생명의 시작(배아·낙태)과 끝(안락사·존엄사), 그리고 그 사이의 몸(유전자 편집, 장기이식, 향상 기술)을 둘러싼 윤리적 판단을 다루는 분야.","c":"윤리·공공","u":"2026-07-03","l":18,"p":null},{"n":"생태신학","t":"생태신학","s":"생태신학은 하나님의 창조·섭리 교리를 생태 위기·기후변화·감염병 같은 현실 문제에 응답하도록 재해석하는 신학적 성찰이다.","c":"조직신학·교리","u":"2026-07-03","l":18,"p":null},{"n":"샴마이학파","t":"샴마이학파","s":"샴마이 학파는 1세기 유대교의 엄격한 율법 해석 전통으로, 관용적 힐렐 학파와 대비된다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"서신서연구","t":"서신서연구","s":"서신서연구는 신약 27권 중 서신(letter/epistle) 형식으로 된 문헌 — 바울 서신 13권, 일반 서신(히브리서·야고보·벧전후·요일이삼·유다), 그리고 서신 요소를 가진 계시록 — 을 그 장르·저작 배경·수신자·구조·신학의 관점에서 다루는 분야다.","c":"성경·해석","u":"2026-06-28","l":10,"p":null},{"n":"서울선언문","t":"서울선언문 (Seoul Statement, 2024)","s":"","c":"변증·철학","u":"2026-06-18","l":21,"p":null},{"n":"서임권논쟁","t":"서임권논쟁","s":"서임권 논쟁(11-12세기)은 성직 임명권을 두고 교황과 세속 군주가 벌인 다툼이다. 그레고리 7세와 하인리히 4세의 카노사 사건이 대표적.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"선교","t":"선교","s":"선교(mission)는 두 얼굴을 가진 말이다.","c":"선교","u":"2026-07-14","l":71,"p":null},{"n":"선교동원","t":"선교동원","s":"선교동원(mission mobilization)은 가는 사람 한 명을 모집하는 일이 아니라, 그 한 사람을 보내는 구조 전체를 깨우는 일이다.","c":"선교","u":"2026-07-17","l":45,"p":null},{"n":"선교적공동체","t":"선교적공동체","s":"선교적 공동체(missional community)란 하나님의 선교에 참여하도록 함께 보냄받은 작은 공동체, 곧 선교의 기본 단위다.","c":"선교","u":"2026-07-14","l":101,"p":null},{"n":"선교적삶","t":"선교적삶","s":"선교적 삶(missional life)이란 한 사람의 일상 전체가 하나님의 선교가 되는 삶의 방식이다. 여기서 결정적인 것은 장소의 이동이 아니라 자기 이해의 전환이다.","c":"선교","u":"2026-07-14","l":74,"p":null},{"n":"선교적해석학","t":"선교적 해석학","s":"선교적 해석학은 성경 본문을 하나님의 선교(Missio Dei)라는 메타내러티브의 맥락에서 읽고 적용하는 해석학적 접근이다.","c":"성경·해석","u":"2026-06-28","l":21,"p":null},{"n":"선교패러다임","t":"선교패러다임","s":"선교 패러다임(mission paradigm)이란 한 시대와 신학 전통이 \"선교란 무엇이며, 누가 어디서 어떻게 하는가\"에 관해 공유하는 기본 틀이다.","c":"선교","u":"2026-07-14","l":41,"p":null},{"n":"선지서","t":"선지서","s":"선지서(느비임, 나비의 복수형)는 대소선지서를 아우르는 구약 정경의 한 장르다. 이 장르를 여는 첫 관문은 하나의 오해를 걷어내는 일이다","c":"성경·해석","u":"2026-07-18","l":28,"p":null},{"n":"설교학","t":"설교학 (Homiletics)","s":"설교학은 설교의 준비·구성·전달을 학문적으로 다루는 실천신학의 한 분과다.","c":"목회·실천","u":"2026-07-18","l":53,"p":null},{"n":"섭리","t":"섭리","s":"섭리(providence)의 라틴어 어원은 프로비데오(provideo) — pro(미리) + video(보다)다.","c":"조직신학·교리","u":"2026-07-14","l":70,"p":null},{"n":"성경무오","t":"성경무오","s":"성경무오(inerrancy)는 성경이 원본에 있어 오류 없이 기록되었다는 성경론의 핵심 교리다.","c":"변증·철학","u":"2026-07-03","l":15,"p":null},{"n":"성경해석","t":"성경해석","s":"성경해석은 성경 본문을 실제로 푸는 실천이다. topics/성경해석학이 세워 둔 비유를 빌리면, 해석이 요리라면 해석학은 요리법이다","c":"성경·해석","u":"2026-07-14","l":58,"p":null},{"n":"성도의견인","t":"성도의 견인","s":"성도의 견인은 하나님께 중생하고 유효하게 부르심을 받은 자가 때로 죄에 빠질지언정 그 신분에서 완전히 타락하여 구원을 상실하는 일은 없다는 교리다.","c":"조직신학·교리","u":"2026-07-03","l":19,"p":null},{"n":"성령","t":"성령","s":"이 볼트의 강단들이 성령을 말할 때 공통으로 먼저 내놓는 것은 부정문이다 — 성령은 무엇이 \"아닌가\". people/문대원 목사는 \"성령은 요술방망이가 아니라 하나님이시다\", \"에너지가 아니라 인격이고 하나님이시다\"라고 못박는다.","c":"조직신학·교리","u":"2026-07-14","l":36,"p":null},{"n":"성령충만","t":"성령충만","s":"성령충만은 이 볼트에서 일회적 사건이 아니라 날마다 갱신되어야 하는 채움으로 일관되게 다뤄진다. 그 신학적 닻은 에베소서 5:18, \"술 취하지 말라 이는 방탕한 것이니 오직 성령으로 충만함을 받으라\"이다.","c":"조직신학·교리","u":"2026-07-14","l":56,"p":null},{"n":"성례","t":"성례","s":"성례(sacrament)는 은혜의 가시적 표징이다. 중세 교회는 세례·성찬 등 일곱 성례 체계를 확립했다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"성상논쟁","t":"성상논쟁","s":"성상(이콘) 논쟁은 8-9세기 동방 교회에서 성화상 숭배의 정당성을 둘러싼 대립이다. 787년 제2차 니케아 공의회가 성상 공경을 인정했다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"성육신","t":"성육신","s":"성육신(Incarnation, 도성인신 道成人身)은 영원 전부터 계신 말씀(로고스)이 인간의 육신을 취하여 역사 안으로 들어오신 사건이다.","c":"조직신학·교리","u":"2026-07-14","l":44,"p":null},{"n":"성찬","t":"성찬","s":"성찬(聖餐)은 말씀 선포·세례와 함께 전통적으로 topics/은혜의수단을 이루는 성례다. 이름 그대로 \"성스러운 식사\"이며, 본래 가족 단위로 함께 나누는 거룩한 회식이었다.","c":"조직신학·교리","u":"2026-07-18","l":28,"p":null},{"n":"세계기독교","t":"세계기독교","s":"세계기독교(World Christianity)는 기독교가 서구의 특정 문화·제도 형태에 귀속된 종교가 아니라, 세계 각 지역의 언어·문화·역사 안에서 다양하게 구현되는 다중심적(polycentric) 신앙 운동임을 강조하는 학문적·선교학적 개념이다.","c":"선교","u":"2026-07-18","l":22,"p":null},{"n":"세계복음화","t":"세계복음화","s":"세계복음화는 모든 종족과 민족에게 복음이 증거되어 하나님 나라가 확장되는 과정이다. 마태복음 28:18-20의 대위임령에 근거하며, 지리적 확산뿐 아니라 모든 종족 집단(people group)에 복음이 뿌리내리는 것을 목표로 한다.","c":"선교","u":"2026-06-28","l":22,"p":null},{"n":"세대전수","t":"세대전수","s":"세대전수(世代傳受)는 한 세대가 살아낸 믿음을 다음 세대가 이어 가도록 물려주는 일의 구조와 실천을 가리킨다.","c":"목회·실천","u":"2026-07-17","l":22,"p":null},{"n":"세례","t":"세례","s":"세례(침례)는 예수님을 구원자로 공적으로 고백하는 성례로, topics/은혜의수단 가운데 말씀 선포 다음에 놓이는 두 번째 수단이다.","c":"조직신학·교리","u":"2026-07-03","l":11,"p":null},{"n":"세속화","t":"세속화","s":"세속화(secularization)를 도덕적 타락의 동의어로 읽으면 첫걸음부터 길을 잃는다. 라틴어 사에쿨룸(saeculum)은 본래 악을 뜻하지 않았다.","c":"윤리·공공","u":"2026-07-17","l":46,"p":null},{"n":"속죄","t":"속죄","s":"속죄는 완전한 신성과 완전한 인성이 한 위격 안에 연합된 topics/성육신을 근거로, 그리스도께서 삶과 죽음으로 이루신 순종과 고난이다.","c":"조직신학·교리","u":"2026-07-03","l":13,"p":null},{"n":"속죄론","t":"속죄론","s":"속죄론(theories of the atonement)은 그리스도의 죽음이 어떻게 구원을 이루는가를 설명하는 이론과 모델들의 지형이다.","c":"조직신학·교리","u":"2026-07-14","l":103,"p":null},{"n":"수도원운동","t":"수도원운동","s":"수도원운동은 금욕과 공동생활로 영성을 추구한 운동이다. 베네딕도회에서 시작해 클뤼니 개혁, 시토회, 탁발수도회(프란치스코·도미니코회)로 전개되었다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"순종","t":"순종","s":"순종을 뜻하는 신약의 말 휘파코에(ὑπακοή)는 '아래서'(ὑπό) '듣는다'(ἀκούω)는 두 낱말이 붙어 만들어졌다.","c":"목회·실천","u":"2026-07-11","l":55,"p":null},{"n":"스콜라주의","t":"스콜라주의","s":"스콜라주의(scholasticism)는 신앙과 이성의 조화를 추구한 중세 대학의 신학 방법이다. 안셀무스·아벨라르를 거쳐 토마스 아퀴나스에서 절정에 이르렀다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"스토아학파","t":"스토아학파 (Stoicism)","s":"스토아학파는 주전 3세기 제논(Zeno of Citium)이 창시한 그리스-로마 철학 전통으로, 이성(로고스)과 자연법에 따른 삶, 덕목(virtue)의 추구를 핵심으로 삼는다.","c":"성경·해석","u":"2026-06-28","l":13,"p":null},{"n":"시내산언약","t":"시내산 언약","s":"시내산 언약(출19-24)은 이스라엘이 애굽에서 나온 뒤 시내산에서 하나님과 맺은 언약으로, 십계명과 언약서(출20-23)를 중심으로 한다.","c":"성경·해석","u":"2026-07-02","l":17,"p":null},{"n":"시편","t":"시편","s":"시편(세페르 티힐림, \"찬양의 책\")은 다윗 한 사람의 저작이 아니라 저자·공동체·민족의 다양한 목소리가 시대를 가로질러 모여 이루어진 책이다.","c":"성경·해석","u":"2026-07-03","l":29,"p":null},{"n":"시험과유혹","t":"시험과 유혹","s":"성경은 하나의 헬라어 단어 페이라스모스(πειρασμός)를 두 개의 얼굴로 쓴다. 하나는 하나님이 성숙을 위해 허락하시는 연단이고, 다른 하나는 사람을 죄로 끌어들이는 유혹이다.","c":"목회·실천","u":"2026-07-17","l":36,"p":null},{"n":"신국론","t":"신국론","s":"『신국론(De Civitate Dei)』은 어거스틴의 저작으로, 하나님의 도성과 세상 도성을 대비해 역사와 교회-국가 관계를 신학적으로 해석했다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"신명기학파","t":"신명기학파","s":"신명기학파는 신명기의 저작 연대·저자·목적을 둘러싼 현대 성서비평학의 논쟁 지형을 가리킨다.","c":"성경·해석","u":"2026-07-02","l":14,"p":null},{"n":"신본주의","t":"신본주의","s":"신본주의(theocentrism)는 인간이 아니라 하나님을 모든 가치·규범의 중심에 두는 관점으로, 하나님의 주권에 근거한 기독교 윤리의 토대다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"신성로마제국","t":"신성로마제국","s":"신성로마제국은 962년 오토 1세 대관 이후의 중세 서유럽 제국으로, 황제권과 교황권의 협력·갈등의 무대였다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"신앙과이성","t":"신앙과이성","s":"신앙과 이성의 문제(faith and reason)는 믿는 일과 따져 아는 일이 서로 어떤 관계에 놓이는가를 묻는다.","c":"변증·철학","u":"2026-07-14","l":130,"p":null},{"n":"신앙교육","t":"신앙교육","s":"신앙교육은 받은 믿음을 다음 세대에게 의도적으로 가르치는 실천이다. 이 볼트에는 믿음의 전달을 다루는 여러 페이지가 이미 서 있어, 신앙교육의 자리를 분명히 하려면 그 이웃들과 구별해야 한다.","c":"상담·가정","u":"2026-07-18","l":32,"p":null},{"n":"신앙전수","t":"신앙전수","s":"신앙전수(generational transmission of faith)는 한 세대가 인격적으로 만나 살아낸 믿음을 다음 세대가 이어받게 하는 일을 가리킨다.","c":"목회·실천","u":"2026-07-17","l":19,"p":null},{"n":"신앙주의","t":"신앙주의 (Fideism)","s":"신앙주의는 \"불합리하지만 믿는다\"는 입장으로, 이성으로는 어떠한 믿음도 정당하게 가질 수 없으며 신앙은 이성과 근본적으로 이질적이거나 심지어 상충한다고 보는 신학적 태도다.","c":"변증·철학","u":"2026-07-03","l":20,"p":null},{"n":"신적섭리","t":"신적 섭리","s":"신적 섭리는 하나님이 사건 안에 명시적으로 등장하지 않으면서도 배후에서 역사를 이끌어가시는 방식을 가리킨다.","c":"성경·해석","u":"2026-07-18","l":15,"p":null},{"n":"신적통치","t":"신적 통치 (divine government)","s":"하나님의 섭리(providence)를 구성하는 세 요소 — 보존(preservation)·협력(concurrence)·통치(government) — 중 하나로, 피조물로 하여금 하나님의 목적을 이루게 하시는 하나님의 사역을 가리킨다.","c":"조직신학·교리","u":"2026-07-03","l":10,"p":null},{"n":"신학","t":"신학","s":"신학(theology)은 하나님과 그의 계시에 대한 학문적 탐구다. 기독교 윤리학은 신학의 한 분과로, 교리(신론·인간론·구원론)에 근거해 삶의 규범을 도출한다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"실존적전통","t":"실존적 전통 (Existential Tradition)","s":"실존적 전통은 인간의 내면적 주관성 — 동기·목적·의무기준 — 에 윤리의 자리를 두는 관점이다.","c":"윤리·공공","u":"2026-07-03","l":31,"p":null},{"n":"실존주의","t":"실존주의","s":"","c":"윤리·공공","u":"2026-07-03","l":14,"p":null},{"n":"십자가신학","t":"십자가신학","s":"십자가신학(theologia crucis)은 십자가에 관한 신학이 아니라 십자가에 의해 규정된 신학이다.","c":"조직신학·교리","u":"2026-07-14","l":96,"p":null},{"n":"십자군","t":"십자군","s":"십자군(1095-1291)은 성지 탈환을 명분으로 한 서방 기독교의 원정이다. 종교적·정치적·경제적 동기가 얽혔고 동서 교회 관계를 악화시켰다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"아가서","t":"아가서","s":"아가서는 남녀의 사랑을 몸의 언어로 자세히 그리는 지혜문학(케투빔) 계열의 한 책이다.","c":"성경·해석","u":"2026-07-03","l":17,"p":null},{"n":"아브라함언약","t":"아브라함 언약","s":"아브라함 언약은 창세기 12·15·17장에서 하나님이 아브라함과 맺으신 언약으로, 구약개론I 리서치페이퍼(\"아브라함 언약과 시내산 언약 비교 분석\")는 이를 성경 전체를 관통하는 \"언약의 역사\" 틀 안에서 시내산 언약과 짝지어 이해한다.","c":"성경·해석","u":"2026-06-28","l":10,"p":null},{"n":"안식","t":"안식","s":"이 볼트에서 안식은 일을 손에서 놓는 단순한 휴식이 아니라, 일의 주인이 내가 아니라 하나님이심을 고백하며 유한한 존재로 돌아가는 회복이다.","c":"영성·제자도","u":"2026-07-17","l":28,"p":null},{"n":"알렉산드리아학파","t":"알렉산드리아 학파 (Alexandrian School)","s":"알렉산드리아 학파는 이집트 알렉산드리아를 중심으로 2~3세기에 형성된 기독교 신학·성경 해석 전통이다. 플라톤 철학과 기독교 신앙의 통합, 그리고 성경의 알레고리 해석을 특징으로 한다.","c":"교회사","u":"2026-06-28","l":12,"p":null},{"n":"얀센파","t":"얀센파","s":"얀센파(Jansenism)는 MBTS 기독교윤리학 1주차 강의에서 보수주의 윤리 전제의 역사적 예시로 등장하는 신학 운동이다.","c":"윤리·공공","u":"2026-07-03","l":21,"p":null},{"n":"양립가능론","t":"양립가능론","s":"양립가능론(compatibilism)은 신적 결정론(하나님의 절대 주권과 작정)과 인간의 자유의지·도덕적 책임이 동시에 참일 수 있다고 보는 입장이다.","c":"변증·철학","u":"2026-07-18","l":32,"p":null},{"n":"양식비평","t":"양식비평","s":"양식비평(Form Criticism, 독: Formgeschichte)은 복음서가 초대 교회 공동체의 목회적 필요(\"삶의 정황\", Sitz im Leben)에 따라 구전으로 전승되고 양식화된 단편들의 모음집이라는 전제 아래, 그 전승 단위들의 유형·기원·기능을 분석하는 신약학 방법론이다.","c":"성경·해석","u":"2026-07-18","l":30,"p":null},{"n":"양심","t":"양심","s":"양심(συνείδησις, 쉬네이데시스)은 자기 행위를 선악의 기준에 비추어 고발하거나 변호하는 내면의 증인이다.","c":"조직신학·교리","u":"2026-07-17","l":35,"p":null},{"n":"양심의자유","t":"양심의 자유 (Liberty of Conscience)","s":"","c":"교회사","u":"2026-07-04","l":10,"p":null},{"n":"언약","t":"언약","s":"언약(베리트, בְּרִית)은 구약에 287회 등장하지만, 이 볼트에서 그것은 통계 이전에 하나의 문법이다.","c":"성경·해석","u":"2026-07-14","l":82,"p":null},{"n":"언약신학","t":"언약신학","s":"언약신학(covenant theology)은 성경의 여러 언약을 흩어진 사건들의 목록이 아니라 하나의 통일된 구조로 읽어내는 개혁주의 조직신학 체계다.","c":"조직신학·교리","u":"2026-07-14","l":47,"p":null},{"n":"에베소공의회","t":"에베소공의회","s":"431년 공의회. 네스토리우스를 정죄하고 마리아를 '테오토코스(하나님의 어머니)'로 확인했다.","c":"교회사","u":"2026-07-10","l":4,"p":null},{"n":"에스더서","t":"에스더서","s":"에스더서는 하나님의 이름이 단 한 번도 등장하지 않는 구약 유일의 책으로, 이 언어적 공백 때문에 topics/정경화 과정에서 논란을 겪었다.","c":"성경·해석","u":"2026-07-02","l":24,"p":null},{"n":"에큐메니칼운동","t":"에큐메니칼운동","s":"에큐메니칼 운동은 분열된 교회의 일치를 추구하는 20세기 운동으로, 1910년 에든버러 선교대회에서 발원해 세계교회협의회(WCC) 결성으로 이어졌다.","c":"교회사","u":"2026-07-04","l":2,"p":null},{"n":"에피쿠로스학파","t":"에피쿠로스학파","s":"에피쿠로스학파(Epicureanism)는 주전 4세기 말 아테네의 에피쿠로스(Epicurus, 주전 341–270)가 창시한 철학 학파다.","c":"성경·해석","u":"2026-06-28","l":14,"p":null},{"n":"역사적예수","t":"역사적 예수 (Historical Jesus)","s":"\"역사적 예수\"란 18세기 계몽주의 이후 역사 비평적 방법론으로 복음서 전승에서 재구성하려는 나사렛 예수의 역사적 실체를 가리킨다.","c":"성경·해석","u":"2026-07-17","l":28,"p":null},{"n":"역설","t":"역설 (요나서)","s":"구약개론II 5주차 강의는 요나서 전체를 \"역설로 가득 찬\" 책으로 읽는다. 순종해야 할 선지자가 도망가고, 기도해야 할 자가 잠들고, 회개를 거부해야 할 이방인이 오히려 회개한다","c":"성경·해석","u":"2026-07-03","l":9,"p":null},{"n":"연합","t":"연합","s":"연합(union)은 이 볼트에서 두 층위로 논의된다. 첫째는 그리스도와의 연합(union with Christ, unio cum Christo) — 신자가 그리스도 안에서 그분과 하나 되는 존재론적·영적 결합이다.","c":"조직신학·교리","u":"2026-07-17","l":24,"p":null},{"n":"영성","t":"영성","s":"영성(靈性, Spirituality)이란 하나님과의 살아 있는 관계를 삶의 전 영역에서 유지하고 심화해 가는 과정이다.","c":"영성·제자도","u":"2026-06-23","l":66,"p":"https://wiki.youngdoctor.kr/marktl/%EC%98%81%EC%84%B1/"},{"n":"영적전쟁","t":"영적전쟁","s":"영적전쟁은 하나님의 자녀가 혈과 육이 아닌 악한 영적 세력을 상대로 벌이는 싸움을 가리킨다. 고전적 근거는 에베소서 6장의 선언이다","c":"조직신학·교리","u":"2026-07-14","l":93,"p":null},{"n":"영지주의","t":"영지주의 (Gnosticism)","s":"영지주의는 2세기 지중해 세계를 휩쓴 혼합주의 운동이자, 초대교회가 맞선 가장 크고 위험한 이단이었다. 이름은 헬라어 그노시스(γνῶσις, 앎)에서 왔고, 이 운동의 심장에 놓인 확신이 곧 그 이름이다","c":"교회사","u":"2026-07-18","l":37,"p":null},{"n":"영향력","t":"영향력","s":"영향력(影響力, influence)은 리더십의 본질 그 자체다.","c":"목회·실천","u":"2026-06-28","l":18,"p":null},{"n":"예수회","t":"예수회","s":"예수회(Jesuits)는 이그나티우스 로욜라가 세운 가톨릭 수도회로, 결의론(casuistry)적 도덕 판단으로 알려져 윤리사에서 얀센파와 대비되어 인용된다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"예표론","t":"예표론","s":"예표론(Typology)은 구약의 인물·사건·제도가 신약에서 더 크고 완전한 실체로 성취되는 것을 읽어내는 해석 패턴이다.","c":"성경·해석","u":"2026-07-17","l":46,"p":null},{"n":"왕권신학","t":"왕권신학","s":"왕권신학은 이스라엘 왕이 하나님과 맺는 특별한 관계 — 기름부음·아들 됨·토라 연구를 통한 절대 충성의 의무 — 를 다루는 구약의 신학 축이다.","c":"성경·해석","u":"2026-07-03","l":11,"p":null},{"n":"왕정신학","t":"왕정신학","s":"왕정신학은 이스라엘이 사사시대에서 왕정 체제로 전환하는 과정에서 드러나는, 왕권과 하나님의 주권 사이의 신학적 긴장을 다룬다.","c":"성경·해석","u":"2026-06-28","l":14,"p":null},{"n":"우주론적논증","t":"우주론적논증","s":"우주론적 논증(cosmological argument)은 \"왜 우주가 존재하는가\"라는 물음에서 출발한다.","c":"변증·철학","u":"2026-07-17","l":72,"p":null},{"n":"유일신론","t":"유일신론 (Theism)","s":"유일신론(Theism)은 인격적·무한한 하나님이 세계를 초월하면서 동시에 그 안에서 활동하신다고 보는 신관이다.","c":"변증·철학","u":"2026-07-03","l":26,"p":null},{"n":"유효적소명","t":"유효적 소명","s":"유효적 소명(내적 부르심)은 하나님이 택하신 자에게 성령으로 임하는 효력 있는 부르심이다.","c":"조직신학·교리","u":"2026-07-03","l":21,"p":null},{"n":"율법","t":"율법","s":"율법(律法)은 하나님의 뜻이 계명의 형태로 성문화(成文化)된 표현이다.","c":"성경·해석","u":"2026-07-14","l":50,"p":null},{"n":"율법과복음","t":"율법과복음","s":"율법과 복음은 성경이 인간에게 건네는 두 종류의 말씀이다. 율법은 \"하라\"와 \"하지 말라\"로 요구하고, 복음은 \"다","c":"조직신학·교리","u":"2026-07-14","l":50,"p":null},{"n":"율법주의","t":"율법주의","s":"율법주의(legalism)는 규칙의 문자적 준수를 은혜·사랑보다 앞세우는 윤리적 왜곡이다. 상황윤리(반율법주의)와 대척점을 이룬다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"은혜의수단","t":"은혜의 수단 (Means of Grace)","s":"은혜의 수단은 하나님이 그 은혜를 성도에게 전달하기 위해 통상적으로 사용하시는 정해진 통로다. 성령은 죄인의 영혼에 직접 역사하실 수도 있지만, 대개는 특정한 방편을 통해 일하기로 하셨다","c":"조직신학·교리","u":"2026-07-18","l":60,"p":null},{"n":"의료선교","t":"의료선교","s":"의료선교는 의료 전문성을 통해 총체적 선교에 참여하는 방식이다. 단순히 의료 기술을 선교 도구로 사용하는 것이 아니라, 의료 행위 자체가 하나님 나라의 표징이 되는 사역이다.","c":"선교","u":"2026-06-16","l":51,"p":null},{"n":"의무론","t":"의무론","s":"의무론(deontology)은 행위의 옳고 그름을 그것이 낳는 결과가 아니라 행위 자체가 의무·규칙·법칙에 부합하는가로 판단하는 규범윤리 전통이다.","c":"윤리·공공","u":"2026-07-17","l":62,"p":null},{"n":"이방인결혼금지","t":"이방인 결혼금지법","s":"구약 성경 여러 본문에 걸쳐 나타나는, 이스라엘 백성이 이방인과 통혼하는 것을 금지하는 일련의 규정과 그 신학적 목적을 가리킨다.","c":"성경·해석","u":"2026-07-02","l":15,"p":null},{"n":"이슬람권선교","t":"이슬람권선교","s":"이슬람권선교는 무슬림 다수 지역 및 무슬림 공동체를 대상으로 하는 복음 사역을 총칭한다.","c":"선교","u":"2026-06-28","l":8,"p":null},{"n":"이슬람선교","t":"이슬람선교","s":"이슬람선교는 무슬림 개인과 공동체에게 복음을 전하고 그들과 함께 그리스도의 몸을 세워가는 선교 영역을 가리킨다.","c":"선교","u":"2026-06-28","l":18,"p":null},{"n":"이슬람의발흥","t":"이슬람의발흥","s":"7세기 이슬람의 급속한 팽창은 시리아·북아프리카·스페인의 기독교 세계를 잠식하며 지중해 교회 지형을 근본적으로 재편했다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"이신칭의","t":"이신칭의","s":"","c":"조직신학·교리","u":"2026-07-14","l":5,"p":null},{"n":"이웃사랑","t":"이웃사랑","s":"MBTS 구약개론II 4주차 강의(\"선지서란?\")에서 이웃사랑은 레19:9-18의 이삭줍기 규정을 근거로 제시되는 개념이다.","c":"성경·해석","u":"2026-07-03","l":10,"p":null},{"n":"이원론","t":"이원론","s":"조직신학I 5주차 토론(\"창조와 섭리의 관계\")은 이원론을 창조론이 성립하는 순간 곧바로 배제되는 세 가지 오류 가운데 하나로 다룬다.","c":"조직신학·교리","u":"2026-07-03","l":13,"p":null},{"n":"이주민선교","t":"이주민선교","s":"이주민선교는 국경을 넘어 국내로 들어온 사람들 — 이주노동자, 유학생, 난민, 결혼이주민과 그 다문화가정 — 을 대상으로 하는 선교다.","c":"선교","u":"2026-07-14","l":40,"p":null},{"n":"인간론","t":"인간론","s":"인간론(anthropology)은 하나님이 인간을 창조하신 목적과 그 신앙적 의미를 다루는 조직신학의 교리다.","c":"조직신학·교리","u":"2026-07-03","l":13,"p":null},{"n":"인도하심","t":"인도하심","s":"인도하심은 하나님이 자기 백성의 길을 앞서 정하고 이끄시는 동행의 사역을 가리킨다. 이 볼트에 모인 세 메시지는 인도하심을 추상적 교리가 아니라 '가본 적 없는 길'을 통과하는 구체적 경험으로 증언한다는 공통점이 있다.","c":"영성·제자도","u":"2026-06-28","l":14,"p":null},{"n":"인신제사","t":"인신제사","s":"인신제사는 6주차 강의에서 사사기 입다의 딸 사건을 scripture/창22 아브라함의 아케다(이삭 번제 시험)와 대비하며 다뤄지는 주제다.","c":"성경·해석","u":"2026-06-28","l":12,"p":null},{"n":"일반계시","t":"일반계시","s":"일반계시(general revelation)는 하나님이 창조 세계와 역사, 그리고 인간의 양심을 통해 모든 사람에게 자신을 드러내시는 방식을 가리킨다.","c":"변증·철학","u":"2026-07-14","l":36,"p":null},{"n":"일반은총","t":"일반은총","s":"일반은총(Common Grace)은 하나님이 믿는 자와 믿지 않는 자를 구분하지 않고 피조 세계 전체에 베푸시는 은총이다.","c":"조직신학·교리","u":"2026-07-17","l":33,"p":null},{"n":"일신론","t":"일신론","s":"일신론(monotheism)은 신이 오직 하나이며, 그 신만이 예배와 충성의 대상이 된다는 신앙 체계다. 기독교 일신론은 단순히 \"신이 하나\"라는 수적 주장이 아니라, 이 한 분 하나님이 창조주·구속주·심판주로서 모든 권위를 가진다는 신학적 고백이다.","c":"조직신학·교리","u":"2026-07-17","l":28,"p":null},{"n":"일터신학","t":"일터신학","s":"일터신학은 '일이란 무엇인가'를 묻지 않는다. 그 물음은 창조·타락·구속·완성 속의 노동을 다루는 topics/직업신학의 자리다.","c":"영성·제자도","u":"2026-07-17","l":42,"p":null},{"n":"자녀교육","t":"자녀교육","s":"자녀교육은 자녀에게 무엇을 물려줄 것인가를 묻는 일이다.","c":"상담·가정","u":"2026-07-17","l":41,"p":null},{"n":"자료비평","t":"자료비평 (Source Criticism)","s":"자료비평은 복음서 기자들이 어떤 문서 자료를 의존하고 수정했는지를 탐구하는 성경 연구 방법론이다. 신약개론I 3주 강의는 자료비평을 복음서 형성 과정의 두 번째 단계, 즉 구전(양식비평) 이후 문서 단계를 다루는 방법으로 소개한다.","c":"성경·해석","u":"2026-06-28","l":19,"p":null},{"n":"자연법","t":"자연법","s":"자연법(natural law)은 실정법이나 특별 계시 없이도 이성과 창조 질서를 통해 인간이 인식할 수 있는 도덕 원리의 체계다.","c":"윤리·공공","u":"2026-07-17","l":47,"p":null},{"n":"자연신론","t":"자연신론 (Deism)","s":"하나님은 세계를 초월할 뿐 세계에 개입하지 않는다고 보는 신관. MBTS 변증학 2주차 강의가 제시하는 신관 7분류(무신론·다신론·범재신론·제한신론·범신론·자연신론·유일신론) 중 하나다.","c":"변증·철학","u":"2026-07-03","l":6,"p":null},{"n":"자연신학","t":"자연신학 (Natural Theology)","s":"자연신학은 성경(특별계시)의 권위에 호소하지 않고 창조 세계와 인간 이성이라는 재료만으로 하나님에 관한 신학을 세우려는 기획이다.","c":"변증·철학","u":"2026-07-17","l":37,"p":null},{"n":"자연주의적오류","t":"자연주의적 오류 (Naturalistic Fallacy)","s":"자연주의적 오류는 '이다(is)'에서 '해야 한다(ought)'를 직접 도출하는 추론의 오류를 가리킨다.","c":"윤리·공공","u":"2026-07-18","l":61,"p":null},{"n":"자유의지","t":"자유의지","s":"자유의지(free will)는 인간이 스스로 선택하고 행동하는 능력을 가리킨다. 그러나 이 짧은 정의 안에 이미 논쟁의 씨앗이 들어 있다.","c":"조직신학·교리","u":"2026-07-17","l":37,"p":null},{"n":"자유주의","t":"자유주의","s":"(신학적) 자유주의는 성경의 초자연성·권위를 이성·경험에 종속시키는 근대 신학 조류로, 윤리에서 인간 중심적 접근으로 나타난다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"자존감","t":"자존감","s":"자존감(自尊感, self-esteem)은 자기 자신을 가치 있다고 느끼는 심리적 상태를 가리키는 현대 심리학 개념이다.","c":"상담·가정","u":"2026-07-17","l":28,"p":null},{"n":"작정","t":"작정","s":"조직신학I 5주차 토론(\"창조와 섭리의 관계\")은 작정(decree)을 하나님의 섭리와 비슷하지만 구분되는 개념으로 정리한다.","c":"조직신학·교리","u":"2026-07-03","l":10,"p":null},{"n":"장르비평","t":"장르비평","s":"장르비평은 성경 본문을 그 문학 장르에 따라 다르게 읽어야 한다는 해석 원칙이다.","c":"성경·해석","u":"2026-07-02","l":11,"p":null},{"n":"전문인선교","t":"전문인선교","s":"전문인 선교(professional / tentmaker mission)란 목회자로 파송되는 대신 직업 신분으로 선교지에 서는 선교 모델이다.","c":"선교","u":"2026-07-17","l":41,"p":null},{"n":"전인치유","t":"전인 치유","s":"전인 치유(whole-person healing)는 인간을 영(spirit)·몸(body)·정신(mind)·사회(social) 네 차원의 통합된 존재로 보고, 이 모든 차원의 회복을 목표로 하는 치유 이해다.","c":"선교","u":"2026-06-28","l":23,"p":null},{"n":"전제주의","t":"전제주의 (Presuppositionalism)","s":"전제주의는 변증의 출발점을 중립적 이성이나 공통 증거가 아니라 하나님의 존재와 성경의 권위라는 전제(presupposition)에 두는 변증 방법론이다.","c":"변증·철학","u":"2026-06-28","l":11,"p":null},{"n":"점진적계시","t":"점진적 계시","s":"점진적 계시는 구약의 신학적 진리(특히 부활·메시아 예언 같은 주제)가 처음부터 명확하게 선포되지 않고, 시대를 거치며 점점 더 분명한 형태로 드러난다는 해석 원리다.","c":"성경·해석","u":"2026-07-03","l":9,"p":null},{"n":"정경화","t":"정경화","s":"정경화(canonization)는 개별 문서가 권위 있는 성경 본문(\"정경\")으로 확정되어 가는 과정을 가리킨다.","c":"성경·해석","u":"2026-07-17","l":30,"p":null},{"n":"정서주의","t":"정서주의 (Emotivism)","s":"정서주의는 lectures/MBTS/기독교윤리학/05주_실존적전통에서 20세기 언어철학적 전환의 한 국면으로 다뤄지는 메타윤리학적 입장이다.","c":"윤리·공공","u":"2026-07-03","l":10,"p":null},{"n":"정의","t":"정의","s":"","c":"성경·해석","u":"2026-07-14","l":44,"p":null},{"n":"제2성전시대","t":"제2성전시대","s":"제2성전시대(Second Temple Period)는 주전 515년경 바벨론 포로 귀환 후 성전이 재건된 때로부터 주후 70년 로마에 의해 성전이 파괴되기까지의 약 600년을 가리킨다.","c":"성경·해석","u":"2026-06-28","l":17,"p":null},{"n":"제자도","t":"제자도","s":"\"discipleship\"은 성경에 없는 단어다. 복음서의 제자 삶을 보면서 유추한다. lectures/MBTS/개인제자도실습의 정의를 따르면 예수 그리스도를 믿고 따르는 제자, 즉 그리스도인의 topics/정체성이다.","c":"영성·제자도","u":"2026-06-16","l":50,"p":null},{"n":"제한신론","t":"제한신론","s":"제한신론(Finite Godism)은 신이 존재하기는 하나 그 능력이 제한되어 있다고 보는 신관이다. MBTS 변증학 2주차 강의가 제시하는 신관 7분류(무신론·다신론·범재신론·제한신론·범신론·자연신론·유일신론) 중 하나로 다뤄진다.","c":"변증·철학","u":"2026-07-03","l":11,"p":null},{"n":"존재론적논증","t":"존재론적 논증","s":"존재론적 논증(ontological argument)은 하나님의 개념 자체 — \"그 이상의 위대함을 상상할 수 없는 존재\"라는 정의 — 로부터 순수 논리적 추론만으로 하나님의 실재를 이끌어내는 신 존재 증명 방식이다.","c":"변증·철학","u":"2026-07-03","l":19,"p":null},{"n":"종교의자유","t":"종교의자유","s":"종교의 자유는 신앙과 예배를 국가의 강제 없이 선택·실천할 권리다. 종교개혁의 다원화와 로저 윌리엄스·윌리엄 펜의 실험을 거쳐 근대 정교분리로 제도화되었다.","c":"교회사","u":"2026-07-04","l":2,"p":null},{"n":"종교체험","t":"종교체험","s":"개인이 초월적 실재를 만났다고 여겨지는 체험이 하나님 존재를 뒷받침하는 논거가 될 수 있는가를 다루는 변증학적 주제다.","c":"변증·철학","u":"2026-07-03","l":24,"p":null},{"n":"종교회의우위설","t":"종교회의우위설","s":"공의회 수위설(conciliarism)은 교황보다 공의회가 우위에 있다는 이론으로, 교회 대분열을 수습하는 과정에서 부상했다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"죄","t":"죄","s":"죄를 무엇이라 부를 것인가. 이 볼트가 죄를 다루는 방식에서 가장 먼저 거절하는 것은, 죄를 낱개의 잘못 — 거짓말 한 번, 미움 한 조각 — 으로 세는 셈법이다.","c":"영성·제자도","u":"2026-07-17","l":42,"p":null},{"n":"죄성","t":"죄성","s":"죄성(罪性, sinfulness)은 타락 이후 인간이 물려받아 지니게 된, 죄를 향한 본성적 성향이다.","c":"조직신학·교리","u":"2026-07-18","l":24,"p":null},{"n":"중간지식","t":"중간지식 (Middle Knowledge)","s":"중간지식은 조건적 미래 사건에 대한 하나님의 지식 — 즉 \"만일 어떤 자유로운 행위자가 특정 상황에 놓인다면 무엇을 자유로이 선택할 것인가\"를 하나님이 미리 아신다는 개념이다.","c":"변증·철학","u":"2026-07-03","l":20,"p":null},{"n":"중독","t":"중독","s":"중독은 강박과 갈망이 동기가 되어 부정적 결과에도 불구하고 특정 행동이나 물질 사용을 지속하는 상태다.","c":"상담·가정","u":"2026-06-28","l":11,"p":null},{"n":"중보기도","t":"중보기도","s":"중보기도(intercession)는 한 사람이 자신을 위해 구하는 것을 넘어, 다른 영혼·공동체·열방을 위해 하나님 앞에 서서 간구하는 기도다.","c":"영성·제자도","u":"2026-07-18","l":27,"p":null},{"n":"중보자","t":"중보자","s":"중보자는 하나님과 인간 사이를 잇는 존재로, lectures/MBTS/조직신학II/01주토론_그리스도의위격과속죄에서 이상협은 완전한 인성과 완전한 신성이 한 위격 안에 연합된 그리스도만이 참된 중보자가 될 수 있다고 정리한다.","c":"조직신학·교리","u":"2026-07-03","l":14,"p":null},{"n":"중생","t":"중생","s":"중생(重生, regeneration)은 하나님이 죽은 영혼에 새 생명을 심으시는 순간적 사역이다.","c":"조직신학·교리","u":"2026-07-17","l":44,"p":null},{"n":"중세교회","t":"중세교회","s":"중세교회(medieval church)는 대략 서로마 멸망(5세기)부터 종교개혁 전야(15세기)까지의 서방 기독교를 가리킨다.","c":"교회사","u":"2026-07-03","l":11,"p":null},{"n":"증거주의","t":"증거주의","s":"증거주의(Evidentialism)는 충분한 증거라는 필요조건이 믿음 형성의 정당성을 좌우한다고 보는 인식론적 입장이다.","c":"변증·철학","u":"2026-07-03","l":8,"p":null},{"n":"지혜문학","t":"지혜문학","s":"지혜문학(Wisdom Literature)은 구약 정경의 토라-느비임-케투빔(성문서) 삼분 구조 중 케투빔에 속하는 문학군으로, 잠언·욥기·전도서를 중심으로 하며 넓게는 아가서·일부 시편을 포함한다.","c":"성경·해석","u":"2026-06-28","l":11,"p":null},{"n":"직관주의","t":"직관주의","s":"","c":"윤리·공공","u":"2026-07-03","l":11,"p":null},{"n":"직업소명","t":"직업소명","s":"직업소명은 일반적 부르심이 특정한 직업의 자리에서 구체화되는 지점을 분별하는 신학이다. 이 볼트에는 일과 부르심을 다루는 세 페이지가 이미 서 있다.","c":"영성·제자도","u":"2026-07-18","l":40,"p":null},{"n":"진리대응론","t":"진리대응론","s":"진리대응론(Correspondence Theory of Truth)은 하나의 진술이 참이 되려면 그 진술의 진리를 결정하는 \"진리-제조자\"(truth-maker)가 실재 안에 반드시 존재해야 한다는 입장이다.","c":"변증·철학","u":"2026-07-17","l":27,"p":null},{"n":"찬양시","t":"찬양시","s":"찬양시는 시편 안에서 하나님의 성품과 행하신 일을 노래하는 장르로, topics/탄원시와 짝을 이루며 시편 전체의 정서적 스펙트럼 한쪽 끝을 이룬다.","c":"성경·해석","u":"2026-07-03","l":10,"p":null},{"n":"창조과학","t":"창조과학","s":"창조과학은 성경의 창조 기사를 역사적·과학적 사실로 받아들이고, 자연과학의 증거들을 창조주의 존재와 활동에 대한 증언으로 해석하는 학문적·신앙적 운동이다.","c":"변증·철학","u":"2026-06-28","l":10,"p":null},{"n":"창조론","t":"창조론 (Creationism)","s":"창조론은 하나님이 무에서 우주를 지으셨다는 교리이자, 그 창조를 오늘의 과학·해석의 지형 위에서 어떻게 이해할 것인가를 묻는 논의다.","c":"조직신학·교리","u":"2026-07-18","l":67,"p":null},{"n":"창조질서","t":"창조질서","s":"창조질서(creation order)란 하나님이 세계를 지으실 때 그 안에 새겨 넣으신 규범적 구조들의 총체다.","c":"윤리·공공","u":"2026-07-14","l":55,"p":null},{"n":"천년왕국","t":"천년왕국","s":"천년왕국은 그리스도의 재림과 관련된 종말론적 왕국 개념으로, 후천년설·전천년설·무천년설 세 입장으로 나뉜다.","c":"조직신학·교리","u":"2026-07-03","l":8,"p":null},{"n":"청교도","t":"청교도","s":"청교도(Puritans)는 영국 국교회를 더 철저히 개혁(정화)하려던 16-17세기 개혁파 운동이다. 언약신학·주일성수·경건 생활을 강조했고 뉴잉글랜드 이주로 미국 기독교의 토대가 되었다.","c":"교회사","u":"2026-07-04","l":2,"p":null},{"n":"청소년사역","t":"청소년사역","s":"청소년사역은 청소년기(약 12–18세)의 신앙 형성과 정체성 확립을 위한 교회·가정·교육 공동체의 통합적 노력을 가리킨다.","c":"목회·실천","u":"2026-06-28","l":17,"p":null},{"n":"청지기","t":"청지기","s":"청지기(steward)를 헬라어 신약은 오이코노모스(οἰκονόμος)라 부른다. 집(오이코스 οἶκος)과 법(노모스 νόμος)이 합쳐진 말, 곧 남의 집 살림을 법대로 맡아 운영하는 사람이다.","c":"윤리·공공","u":"2026-07-14","l":103,"p":null},{"n":"초대교회","t":"초대교회","s":"초대교회(early church)는 사도 시대 이후부터 대략 초대 에큐메니칼 공의회 시대(1~5세기)까지의 기독교 공동체를 가리킨다.","c":"교회사","u":"2026-07-03","l":7,"p":null},{"n":"초월성","t":"초월성 (transcendence)","s":"하나님이 만물보다 훨씬 크시다는 것을 가리키는 신론의 속성. 하나님과 피조물 사이의 관계를 표현하는 두 축 가운데 하나이며, 다른 한 축은 하나님이 만물에 개입해 계신다는 topics/내재성이다.","c":"조직신학·교리","u":"2026-07-03","l":10,"p":null},{"n":"충족이유율","t":"충족이유율 (Principle of Sufficient Reason, PSR)","s":"충족이유율(PSR)은 \"모든 우연적 개체에게는 왜 그것이 존재하는지에 대한 충분한 설명이 존재한다\"는 원리다.","c":"변증·철학","u":"2026-07-03","l":20,"p":null},{"n":"치유","t":"치유","s":"이 볼트에서 \"치유\"는 의료적 회복에 한정되지 않고, 영혼의 구원과 육체의 회복, 관계와 가정의 회복까지 통합하는 신학적 개념으로 다루어진다.","c":"상담·가정","u":"2026-07-17","l":62,"p":null},{"n":"칭의론","t":"칭의론","s":"칭의(稱義, justification)는 하나님이 죄인을 그 법정에서 \"의롭다\"고 선언하시는 단번의 행위다.","c":"교회사","u":"2026-07-14","l":42,"p":null},{"n":"카롤링거문예부흥","t":"카롤링거문예부흥","s":"카롤링거 문예부흥은 샤를마뉴 치세(8-9세기) 궁정 학교를 중심으로 한 학문·전례·필사 부흥으로, 고전과 교부 문헌을 보존했다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"카르마와윤회","t":"카르마와 윤회","s":"불교·힌두교 계열 세계관에서 악과 고통을 설명하는 개념 체계. MBTS 변증학 4주차(하나님의 섭리 문제) 강의에서 악의 문제에 대한 \"다섯 가지 부족한 대답\" 중 하나로 다뤄진다.","c":"변증·철학","u":"2026-07-03","l":4,"p":null},{"n":"칼람우주론적논증","t":"칼람 우주론적 논증 (Kalam Cosmological Argument)","s":"칼람 우주론적 논증은 우주에 시작이 있다는 전제에서 그 시작의 원인인 창조주로 나아가는 논증이다. 중세 무슬림 신학자들(칼람은 아랍어로 '말·변론'을 뜻하는 이슬람 사변신학의 이름)이 개발했고 기독교 신학자 보나벤투라도 승인했다.","c":"변증·철학","u":"2026-07-17","l":35,"p":null},{"n":"칼케돈공의회","t":"칼케돈공의회","s":"451년 공의회. 그리스도의 한 위격 안 두 본성(신성·인성)의 교리(칼케돈 정의)를 확정했다.","c":"교회사","u":"2026-07-10","l":4,"p":null},{"n":"쾌락주의","t":"쾌락주의","s":"쾌락주의(hedonism)는 쾌락을 유일한 내재적 선으로, 고통을 악으로 보는 가치론이다. 아리스티포스의 키레네 학파에서 에피쿠로스로 이어진다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"크리스텐덤","t":"크리스텐덤","s":"크리스텐덤(Christendom)은 기독교가 국가·사회·문화를 지배하는 체제다. 313년 밀라노 칙령에서 시작되어 계몽·시민혁명으로 쇠퇴, 20세기 말 포스트크리스텐덤에 이르렀다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"타문화선교","t":"타문화선교","s":"타문화선교는 선교사가 자신의 문화권을 떠나 언어·가치·세계관이 다른 환경으로 들어가, 그 안에서 복음을 증거하고 교회를 세우는 사역이다.","c":"선교","u":"2026-07-17","l":50,"p":null},{"n":"탄원시","t":"탄원시","s":"탄원시(Lament Psalm)는 시편의 약 3분의 1을 차지하는 대표 장르로, 당황스럽거나 고통스러운 상황에서 하나님께 직접 호소하는 기도의 시다.","c":"영성·제자도","u":"2026-07-03","l":20,"p":null},{"n":"통전적선교","t":"통전적선교","s":"통전적 선교(holistic/integral mission, misión integral)는 복음 선포(kerygma)와 사회적 섬김·책임(diakonia)을 두 개의 사업으로 나누지 않고 한 복음의 두 표현으로 붙잡는 선교 이해다.","c":"선교","u":"2026-07-14","l":51,"p":null},{"n":"편집비평","t":"편집비평 (Redaction Criticism)","s":"편집비평(Redaktionsgeschichte)은 복음서 연구 방법론 중 하나로, 복음서 기자들이 기존 자료(마가복음, Q자료, 특수 자료 등)를 편집한 방식을 분석하여 그들의 신학적 목적과 강조점을 규명하는 접근이다.","c":"성경·해석","u":"2026-06-28","l":17,"p":null},{"n":"포스트모더니즘","t":"포스트모더니즘","s":"포스트모더니즘은 사조이기 전에 정서다. 그 정서의 이름은 환멸이다.","c":"변증·철학","u":"2026-07-17","l":51,"p":null},{"n":"플라톤학파","t":"플라톤학파 (Platonism)","s":"플라톤학파(Platonism)는 고대 그리스 철학자 플라톤(기원전 428/427–348/347)의 사상에 기반한 철학 전통이다.","c":"성경·해석","u":"2026-06-28","l":17,"p":null},{"n":"필리오케","t":"필리오케","s":"필리오케(filioque, '그리고 아들로부터')는 성령이 성부'와 성자'에게서 나온다는 서방 신조 추가어로, 동서 교회 분열의 신학적 쟁점이 되었다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"하나님나라","t":"하나님나라","s":"하나님나라(the Kingdom of God)에서 '나라'는 우선적으로 장소가 아니라 다스림이다.","c":"선교","u":"2026-07-14","l":65,"p":null},{"n":"하나님의사랑","t":"하나님의사랑","s":"이 볼트가 증언하는 하나님의 사랑은 하나님을 기술하는 여러 속성 가운데 하나가 아니라, 하나님이 자기 밖으로 움직이시는 방식 그 자체다.","c":"조직신학·교리","u":"2026-07-17","l":47,"p":null},{"n":"하나님의선교","t":"하나님의선교","s":"하나님의 선교란 선교를 신론(神論)의 문제로 되돌려 놓는 관점이다. 곧 \"우리가 무엇을 해야 하는가\"가 아니라 \"하나님이 어떤 분이시기에 선교라는 것이 존재하는가\"를 묻는 자리다.","c":"선교","u":"2026-07-14","l":69,"p":null},{"n":"하나님의속성","t":"하나님의 속성","s":"하나님의 속성(Divine Attributes)은 \"하나님이 어떤 분이신가\"를 기술하는 신학적 범주다.","c":"조직신학·교리","u":"2026-07-17","l":37,"p":null},{"n":"하나님의영광","t":"하나님의영광","s":"하나님의 영광(the glory of God)이란 무엇인가. 흔히 그것을 하나님을 둘러싼 광채나 찬양의 장식쯤으로 여기지만, 이 볼트의 자료들이 거듭 되돌아가는 대답은 훨씬 무겁다.","c":"조직신학·교리","u":"2026-07-14","l":41,"p":null},{"n":"하나님의임재","t":"하나님의임재","s":"하나님의 임재(presence)란 무엇인가. 이 볼트의 설교들이 거듭 내놓는 대답은, 그것이 성경이 말하는 \"가장 큰 복\"이라는 사실이다.","c":"조직신학·교리","u":"2026-07-14","l":29,"p":null},{"n":"하나님의주권","t":"하나님의주권","s":"하나님의 주권(God's sovereignty)은 하나님이 창조주요 통치자로서 모든 존재 위에 가지신 최고 권위, 곧 그분의 다스림에는 위도 없고 밖도 없다는 고백이다.","c":"조직신학·교리","u":"2026-07-14","l":46,"p":null},{"n":"하나님의형상","t":"하나님의형상","s":"하나님의 형상(imago Dei)은 성경이 인간을 정의하는 첫 단어다. 창세기의 창조 기사가 여섯째 날에 이르러 리듬을 바꾸는 지점에서 이 단어가 등장한다","c":"조직신학·교리","u":"2026-07-14","l":53,"p":null},{"n":"해석학역사","t":"해석학의 역사 (History of Hermeneutics)","s":"","c":"성경·해석","u":"2026-07-04","l":5,"p":null},{"n":"헌신","t":"헌신","s":"헌신은 소유권을 이전하는 행위다.","c":"영성·제자도","u":"2026-07-14","l":55,"p":null},{"n":"헤렘","t":"헤렘","s":"헤렘(חרם)은 구약에서 특정 대상을 완전히 하나님께 바쳐 진멸하는 명령을 가리킨다.","c":"성경·해석","u":"2026-06-28","l":26,"p":null},{"n":"헬라어","t":"헬라어 (신약 성서 헬라어, Koine Greek)","s":"","c":"성경·해석","u":"2026-07-04","l":4,"p":null},{"n":"협력","t":"협력","s":"사역 협력(partnership)은 서로 다른 교회·단체·개인이 각자의 자원과 은사와 책임을 나누어 하나의 하나님 나라 사명을 함께 감당하는 동반자 관계다.","c":"선교","u":"2026-07-18","l":31,"p":null},{"n":"협업","t":"협업","s":"협업(協業, collaboration)은 이상협 이사의 강의들을 관통하는 핵심 개념으로, \"개개인의 기여를 합친 것보다","c":"선교","u":"2026-07-13","l":43,"p":null},{"n":"화체설","t":"화체설","s":"화체설(transubstantiation)은 성찬의 빵과 포도주가 그리스도의 실제 몸과 피로 변한다는 교리로, 1215년 제4차 라테란 공의회에서 공식화되었다.","c":"교회사","u":"2026-07-03","l":2,"p":null},{"n":"화해","t":"화해","s":"화해(카탈라게 καταλλαγή)에 관한 이 볼트의 논의는 topics/관계회복 확정판 에세이가 허브로 다룬다","c":"상담·가정","u":"2026-07-10","l":10,"p":null},{"n":"환대","t":"환대 (Hospitality, φιλοξενία)","s":"환대는 낯선 자를 기꺼이 맞이하는 영적·실천적 태도다. 헬라어 필록세니아(φιλοξενία)는 '낯선 자(ξένος)를 사랑하는 것(φιλία)'이라는 뜻으로, 이미 아는 사람을 접대하는 것과 근본적으로 다르다.","c":"선교","u":"2026-06-27","l":23,"p":"https://wiki.youngdoctor.kr/marktl/%ED%99%98%EB%8C%80/"},{"n":"회심","t":"회심","s":"회심(回心, conversion)은 사람이 자기 삶의 방향을 하나님께로 트는 사건이다. 신약이 이 일에 붙인 대표적 동사는 에피스트레포(ἐπιστρέφω, 돌아서다·돌이키다)인데, 이 한 동사가 두 방향을 동시에 품는다.","c":"조직신학·교리","u":"2026-07-14","l":35,"p":null},{"n":"회의주의","t":"회의주의","s":"회의주의(skepticism)는 확실한 도덕 지식의 가능성을 의심하는 입장이다. 프로타고라스의 인간척도설이 그 고전적 뿌리다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null},{"n":"희년","t":"희년","s":"희년(Jubilee, 禧年)은 레위기 25장에 규정된 이스라엘의 50년 주기 제도로, 토지 반환·부채 탕감·종의 해방을 핵심으로 한다.","c":"성경·해석","u":"2026-07-18","l":32,"p":null},{"n":"희생제사","t":"희생제사","s":"희생제사(犧牲祭祀)는 구약 이스라엘이 하나님께 짐승이나 곡물을 드려 죄의 문제를 다루고 관계를 회복하는 제의 제도다.","c":"성경·해석","u":"2026-07-17","l":39,"p":null},{"n":"히브리어","t":"히브리어 (구약 성서 히브리어, Biblical Hebrew)","s":"","c":"성경·해석","u":"2026-07-04","l":6,"p":null},{"n":"힐렐학파","t":"힐렐학파","s":"힐렐 학파는 1세기 유대교의 관용적·유연한 율법 해석 전통으로, 엄격한 샴마이 학파와 대비된다. 율법 적용의 두 노선으로 인용된다.","c":"윤리·공공","u":"2026-07-03","l":3,"p":null}];

CATS.forEach((c,i)=>{
  const b=document.createElement('button');b.type='button';
  b.innerHTML=c+' <span class="n">'+(counts[c]||0)+'</span>';
  b.onclick=()=>{state.cat=(state.cat===c?'':c);render()};
  b.dataset.cat=c;catbar.appendChild(b);
});
$('q').addEventListener('input',e=>{state.q=norm(e.target.value);render()});
$('sort').addEventListener('change',e=>{state.sort=e.target.value;render()});
$('pubonly').addEventListener('click',e=>{state.pub=!state.pub;e.currentTarget.setAttribute('aria-pressed',state.pub);render()});
const esc=t=>t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function render(){
  catbar.querySelectorAll('button').forEach(b=>b.classList.toggle('active',(b.dataset.cat||'')===state.cat));
  let rows=DATA.filter(d=>
    (!state.cat||d.c===state.cat)&&
    (!state.pub||d.p)&&
    (!state.q||norm(d.n+' '+d.t+' '+d.s+' '+d.c).includes(state.q)));
  if(state.sort==='name')rows.sort((a,b)=>a.n.localeCompare(b.n,'ko'));
  else if(state.sort==='links')rows.sort((a,b)=>b.l-a.l);
  else rows.sort((a,b)=>(b.u||'').localeCompare(a.u||''));
  $('result').textContent=rows.length+' / '+DATA.length+'개 주제'+(state.cat?' · '+state.cat:'')+(state.pub?' · 발행됨':'');
  $('grid').innerHTML=rows.length?rows.map(d=>{
    const hue='hue'+CATS.indexOf(d.c);
    const foot=d.p
      ?'<a class="read" href="'+d.p+'">아카이브에서 읽기 →</a>'
      :'<span class="unpub">위키 내부 노트</span>';
    return '<article class="card"><div class="card-top"><span class="chip '+hue+'">'+esc(d.c)+'</span>'+
      '<span class="date">'+esc(d.u||'')+'</span></div>'+
      '<h3>'+esc(d.t)+'</h3><p>'+esc(d.s)+'</p>'+
      '<div class="card-foot"><span class="deg">연결 '+d.l+'</span>'+foot+'</div></article>';
  }).join(''):'<div class="empty">조건에 맞는 주제가 없습니다. 검색어나 필터를 조정해 보세요.</div>';
}
render();
</script></body></html>
